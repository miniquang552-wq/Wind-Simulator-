<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AeroPro - Real Flow Simulation</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #010204; color: #e6edf3; overflow: hidden; display: flex; flex-direction: column; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(13, 17, 23, 0.9); padding: 18px; border-radius: 12px; border: 1px solid #30363d; z-index: 10; width: 240px; backdrop-filter: blur(8px); }
        h3 { margin: 0 0 12px 0; color: #58a6ff; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 4px; font-weight: bold; }
        select, input[type="range"] { width: 100%; margin-bottom: 12px; background: #21262d; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 6px; }
        button { width: 100%; background: #da3633; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>REAL-FLOW SIM</h3>
        <div class="controls">
            <label>Windgeschwindigkeit</label>
            <input type="range" id="speedRange" min="2" max="15" step="0.1" value="7">
            
            <label>Modell auswählen</label>
            <select id="objectSelect" onchange="currentMode = this.value">
                <option value="wing">✈️ High-Lift Flügel</option>
                <option value="supercar">🏎️ Sportwagen</option>
                <option value="rocket">🚀 Raketenspitze</option>
                <option value="cat">🐈 Katze</option>
                <option value="f1">🏎️ F1 Heckflügel</option>
                <option value="drop">💧 Tropfenform</option>
                <option value="draw">✏️ Freihand</option>
            </select>
        </div>
        <button onclick="resetObstacles()">Simulation Reset</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');

        let width, height, particles = [], obstacles = [];
        let windSpeed = 7;
        let currentMode = 'wing';
        let isDrawing = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Wir nutzen mehr Partikel für dichtere Rauchstreifen
            for (let i = 0; i < 1200; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() { this.reset(Math.random() * width); }
            reset(startX) {
                this.x = startX;
                this.y = Math.random() * height;
                this.vx = windSpeed;
                this.vy = 0;
                this.history = []; // Für den Schweif-Effekt
            }
            update() {
                // Luftwiderstand und Reibungssimulation
                let noise = (Math.random() - 0.5) * 0.2; 
                this.vx += (windSpeed - this.vx) * 0.05 + noise;
                this.vy *= 0.96; // Dämpfung

                obstacles.forEach(obs => {
                    let dx = this.x - obs.x;
                    let dy = this.y - obs.y;
                    let r = obs.r || 40;
                    let distSq = dx*dx + dy*dy;

                    if (distSq < r*r) {
                        let dist = Math.sqrt(distSq);
                        let nx = dx / dist;
                        let ny = dy / dist;

                        // Rausdrücken aus dem Objekt
                        this.x += nx * (r - dist);
                        
                        // Ablenkung
                        let dot = this.vx * nx + this.vy * ny;
                        this.vx -= 1.4 * dot * nx;
                        this.vy -= 1.4 * dot * ny;

                        // TURBULENZ
