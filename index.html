<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero Pro - Realistic Fluid Lab</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 10; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h3 { margin: 0 0 10px 0; color: #00ffcc; font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #111; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        .btn-group { display: flex; gap: 4px; margin-bottom: 8px; }
        button { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 7px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: 0.2s; }
        button.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        #resetBtn { background: #cc0000; color: white; border: none; width: 100%; font-weight: bold; margin-top: 5px; cursor: pointer; padding: 10px; border-radius: 4px; }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        
        #penControls { display: block; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; max-height: 200px; opacity: 1; }
        #penControls.hidden { max-height: 0; opacity: 0; margin: 0; padding: 0; pointer-events: none; }
        
        .cheat-mode { background: #400 !important; border-color: #f00 !important; }
        .cheat-mode h3 { color: #f00 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 id="appTitle">Aero-Endless-Lab</h3>
        
        <div class="section">
            <label>Werkzeug</label>
            <select id="objectSelect" onchange="updateToolMode(this.value)">
                <option value="draw">✏️ Freihand Stift</option>
                <option value="rect_fixed">⬛ Festes Quadrat</option>
                <option value="circle_fixed">🌑 Fester Kreis</option>
                <option value="wing">✈️ NACA Flügel</option>
                <option value="supercar">🏎️ GT Auto</option>
            </select>
        </div>

        <div id="penControls" class="section">
            <label>Stift-Einstellungen</label>
            <input type="range" id="penSize" min="5" max="35" value="15">
            <div class="btn-group">
                <button id="solidBtn" class="active" onclick="setLineStyle('solid')">Voll</button>
                <button id="dashBtn" onclick="setLineStyle('dashed')">Gitter</button>
            </div>
            <div id="shapeSubControls" class="btn-group" style="display:none;">
                <button id="circleBtn" class="active" onclick="setPenShape('circle')">Kreis</button>
                <button id="rectBtn" onclick="setPenShape('rect')">Block</button>
            </div>
        </div>

        <div class="section">
            <label>Windstärke</label>
            <input type="range" id="speedRange" min="3" max="18" step="0.5" value="8">
        </div>
        
        <button id="resetBtn" onclick="resetSim()">🧹 Kanal leeren</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles = [], obstacles = [];
        let windSpeed = 8;
        let currentMode = 'draw';
        let lineStyle = 'solid';
        let penShape = 'circle';
        let isDrawing = false;
        let lastX = null, lastY = null;
        let isCheater = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<width; i+=25) spawnColumn(i);
        }

        function spawnColumn(xPos) {
            for (let y = 10; y < height; y += 22) {
                particles.push(new Particle(xPos, y + (Math.random()*12 - 6)));
            }
        }

        function updateToolMode(mode) {
            currentMode = mode;
            document.getElementById('penControls').className = (mode === 'draw') ? 'section' : 'section hidden';
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('solidBtn').className = (style === 'solid') ? 'active' : '';
            document.getElementById('dashBtn').className = (style === 'dashed') ? 'active' : '';
            document.getElementById('shapeSubControls').style.display = (style === 'dashed') ? 'flex' : 'none';
        }

        function setPenShape(shape) {
            penShape = shape;
            document.getElementById('circleBtn').className = (shape === 'circle') ? 'active' : '';
            document.getElementById('rectBtn').className = (shape === 'rect') ? 'active' : '';
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseY = y;
                this.vx = windSpeed; this.vy = 0;
                this.turb = 0;
                this.active = true;
            }
            update() {
                this.vx = windSpeed;
                this.vy += (this.baseY - this.y) * 0.04;
                this.vy *= 0.85;
                this.turb *= 0.93;

                obstacles.forEach(obs => {
                    let r = obs.r || 15;
                    let dx, dy, dist;

                    if (obs.isLine) {
                        let l2 = Math.pow(obs.x2 - obs.x1, 2) + Math.pow(obs.y2 - obs.y1, 2);
                        let t = Math.max(0, Math.min(1, ((this.x - obs.x1) * (obs.x2 - obs.x1) + (this.y - obs.y1) * (obs.y2 - obs.y1)) / l2));
                        let px = obs.x1 + t * (obs.x2 - obs.x1);
                        let py = obs.y1 + t * (obs.y2 - obs.y1);
                        dx = this.x - px; dy = this.y - py;
                        dist = Math.hypot(dx, dy);
                    } else if (obs.type === 'wing') {
                        // Präzise NACA-Profil-Kollision (angenähert über Spline/Bezier-Punkte)
                        dist = this.getNACACollision(obs);
                        dx = this.x - obs.x; dy = this.y - obs.y; 
                    } else if (obs.type === 'supercar') {
                        // Präzise Auto-Silhouette-Kollision
                        dist = this.getCarCollision(obs);
                        dx = this.x - obs.x; dy = this.y - obs.y;
                    } else {
                        dx = this.x - obs.x; dy = this.y - obs.y;
                        dist = Math.hypot(dx, dy);
                    }

                    if (dist < r + 40) {
                        let influence = (r + 40 - dist) / 40;
                        this.vx -= (dx / dist) * influence * windSpeed * 0.7;
                        this.vy += (dy / dist) * influence * windSpeed * 1.2;
                        if (dist < r) {
                            let angle = Math.atan2(dy, dx);
                            this.x += Math.cos(angle) * (r - dist);
                            this.y += Math.sin(angle) * (r - dist);
                            this.turb += 2.2;
                        }
                    }

                    // Aufwirbelung im Windschatten
                    let centerX = obs.isLine ? (obs.x1 + obs.x2)/2 : obs.x;
                    let centerY = obs.isLine ? (obs.y1 + obs.y2)/2 : obs.y;
                    let shadowLength = (obs.type === 'wing' || obs.type === 'supercar') ? 300 : 250;
                    if (this.x > centerX && this.x < centerX + shadowLength) {
                        if (Math.abs(this.y - centerY) < r * 1.6) {
                            this.turb += (obs.type === 'wing' && dy < 0) ? 0.08 : 0.14; // Weniger Wirbel über dem Flügel (Auftrieb)
                            this.vy += Math.sin(this.x * 0.05 + Date.now() * 0.01) * this.turb;
                        }
                    }
                });

                this.x += this.vx;
                this.y += this.vy;
                if (this.x > width + 30) this.active = false;
            }

            getNACACollision(obs) {
                // Näherung eines NACA 4-Digit-Profils über Bezier-Punkte (Fokus auf physische Wirkung)
                let L = 120; // Sehnenlänge
                let relX = (this.x - obs.x) / L + 0.5;
                if (relX < 0 || relX > 1) return Math.hypot(this.x - obs.x, this.y - obs.y); // Außerhalb

                // Ober- und Unterseite eines NACA 2412 (angenähert)
                let yt_upper = 12 * 0.12 * (0.2969 * Math.sqrt(relX) - 0.1260 * relX - 0.3516 * relX*relX + 0.2843 * relX*relX*relX - 0.1015 * relX*relX*relX*relX);
                let yt_lower = -12 * 0.12 * (0.2969 * Math.sqrt(relX) - 0.1260 * relX - 0.3516 * relX*relX + 0.2843 * relX*relX*relX - 0.1015 * relX*relX*relX*relX);
                
                let yc = (relX < 0.4) ? (0.02 / 0.16) * (0.8 * relX - relX*relX) : (0.02 / 0.36) * (0.2 + 0.8 * relX - relX*relX);
                
                let y_upper = (yc + yt_upper) * L;
                let y_lower = (yc + yt_lower) * L;
                
                let dy = this.y - obs.y;
                if (dy > y_lower && dy < y_upper) return 0; // Kollision
                return Math.min(Math.abs(dy - y_upper), Math.abs(dy - y_lower)); // Distanz zur Oberfläche
            }

            getCarCollision(obs) {
                // Näherung einer GT-Silhouette
                let dx = this.x - obs.x;
                let dy = this.y - obs.y;
                let W = 130; // Breite
                let H = 30;  // Höhe

                // Vereinfachte, asymmetrische Form: Vorne niedriger, hinten Diffusor
                if (Math.abs(dx) < W/2) {
                    let topY = (dx < -W*0.2) ? -H/2 * (1 + (dx + W/2) / (W*0.3)) : // Haube
                               (dx < W*0.1) ? -H : // Dach
                               -H * (1 - (dx - W*0.1) / (W*0.4)); // Heck

                    let botY = (dx > W*0.3) ? H/2 * (1 + (dx - W*0.3) / (W*0.2)) : H/2; // Diffusor
                    
                    if (dy > topY && dy < botY) return 0; // Kollision
                    return Math.min(Math.abs(dy - topY), Math.abs(dy - botY));
                }
                return Math.hypot(dx, dy);
            }

            draw() {
                let r = Math.min(255, this.turb * 85);
                let g = Math.max(0, 255 - (this.turb * 110));
                let b = Math.max(100, 255 - (this.turb * 210));
                ctx.fillStyle = isCheater ? "#f00" : `rgb(${r}, ${g}, ${b})`;
                ctx.fillRect(this.x, this.y, isCheater ? 8 : 3.5, 1.5);
            }
        }

        let spawnAcc = 0;
        function animate() {
            ctx.fillStyle = isCheater ? 'rgba(60, 0, 0, 0.3)' : 'rgba(5, 5, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            spawnAcc += windSpeed;
            if(spawnAcc > 30) {
                spawnColumn(-20);
                spawnAcc = 0;
            }

            drawElements();
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.active;
            });

            requestAnimationFrame(animate);
        }

        function drawElements() {
            ctx.fillStyle = "#111";
            ctx.strokeStyle = isCheater ? "#f00" : "#00ffcc";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";

            obstacles.forEach(obs => {
                ctx.beginPath();
                if (obs.isLine) {
                    ctx.lineWidth = obs.r * 2;
                    ctx.moveTo(obs.x1, obs.y1);
                    ctx.lineTo(obs.x2, obs.y2);
                    ctx.stroke();
                } else if (obs.type === 'circle_fixed' || obs.shape === 'circle') {
                    ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI * 2);
                    ctx.fill(); ctx.stroke();
                } else if (obs.type === 'rect_fixed' || obs.shape === 'rect') {
                    ctx.rect(obs.x - obs.r, obs.y - obs.r, obs.r * 2, obs.r * 2);
                    ctx.fill(); ctx.stroke();
                } else if (obs.type === 'wing') {
                    // Realistisches NACA-Profil zeichnen (4-Digit)
                    drawNACAProfile(ctx, obs.x, obs.y, 120); 
                    obs.r = 25; // Effektiver Kollisionsradius für Partikel-Ablenkung
                } else if (obs.type === 'supercar') {
                    // Realistische GT-Silhouette zeichnen
                    drawCarSilhouette(ctx, obs.x, obs.y, 130, 30);
                    obs.r = 20; // Effektiver Kollisionsradius
                }
                if (obs.type !== 'wing' && obs.type !== 'supercar') {
                    ctx.fill(); ctx.stroke();
                }
            });
        }

        // --- HIER SIND DIE NEUEN REALISTISCHEN ZEICHEN-FUNKTIONEN ---

        function drawNACAProfile(ctx, x, y, L) {
            ctx.fillStyle = "#111"; ctx.strokeStyle = isCheater ? "red" : "#00ffcc"; ctx.lineWidth = 2; ctx.beginPath();
            let points_upper = [], points_lower = [];
            
            // Berechne 50 Punkte für ein glattes Profil
            for (let i = 0; i <= 50; i++) {
                let relX = i / 50;
                let yt = 12 * 0.12 * (0.2969 * Math.sqrt(relX) - 0.1260 * relX - 0.3516 * relX*relX + 0.2843 * relX*relX*relX - 0.1015 * relX*relX*relX*relX);
                let yc = (relX < 0.4) ? (0.02 / 0.16) * (0.8 * relX - relX*relX) : (0.02 / 0.36) * (0.2 + 0.8 * relX - relX*relX);
                
                points_upper.push({ x: x + (relX - 0.5) * L, y: y - (yc + yt) * L });
                points_lower.push({ x: x + (relX - 0.5) * L, y: y - (yc - yt) * L });
            }
            
            ctx.moveTo(points_upper[0].x, points_upper[0].y);
            for (let p of points_upper) ctx.lineTo(p.x, p.y);
            for (let i = points_lower.length - 1; i >= 0; i--) ctx.lineTo(points_lower[i].x, points_lower[i].y);
            ctx.closePath(); ctx.fill(); ctx.stroke();
        }

        function drawCarSilhouette(ctx, x, y, W, H) {
            ctx.fillStyle = "#111"; ctx.strokeStyle = isCheater ? "red" : "#00ffcc"; ctx.lineWidth = 2; ctx.beginPath();
            
            // Start vorne unten
            ctx.moveTo(x - W/2, y + H/2);
            // Frontschürze & Haube
            ctx.quadraticCurveTo(x - W*0.4, y - H*0.2, x - W*0.2, y - H/2);
            // Windschutzscheibe & Dach
            ctx.quadraticCurveTo(x, y - H, x + W*0.1, y - H);
            // Heckscheibe & Heck
            ctx.quadraticCurveTo(x + W*0.3, y - H*0.8, x + W/2, y - H/2);
            // Heckabschluss & Diffusor
            ctx.lineTo(x + W/2, y + H/2);
            // Boden
            ctx.quadraticCurveTo(x, y + H*0.3, x - W/2, y + H/2);
            
            ctx.closePath(); ctx.fill(); ctx.stroke();
        }

        // --- ENDE DER ZEICHEN-FUNKTIONEN ---

        function handleInput(e, isStart) {
            if (isCheater) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const r = parseInt(document.getElementById('penSize').value);

            if (currentMode === 'draw') {
                if (isStart) {
                    lastX = x; lastY = y;
                } else if (lastX !== null) {
                    if (lineStyle === 'solid') {
                        obstacles.push({ x1: lastX, y1: lastY, x2: x, y2: y, r: r, isLine: true });
                    } else {
                        if (Math.hypot(x-lastX, y-lastY) > r * 3.5) {
                            obstacles.push({ x, y, r, shape: penShape, isLine: false });
                        } else return;
                    }
                    lastX = x; lastY = y;
                }
            } else if (isStart) {
                obstacles.push({ x, y, r: (currentMode==='wing' || currentMode==='supercar' ? 1 : r*1.5), type: currentMode, isLine: false });
            }
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => { if (isDrawing) handleInput(e, false); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleInput(e, true); }, {passive: false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) handleInput(e, false); }, {passive: false});
        
        document.getElementById('speedRange').oninput = e => { if(!isCheater) windSpeed = parseFloat(e.target.value); };
        function resetSim() { if(!isCheater) obstacles = []; }
        window.onresize = init;
        init(); animate();

        const uiBox = document.getElementById('ui');
        const acObserver = new MutationObserver(() => {
            if(!isCheater) {
                isCheater = true;
                acObserver.disconnect();
                uiBox.classList.add('cheat-mode');
                document.getElementById('appTitle').innerText = "SYSTEM CRASH";
                windSpeed = 130;
                alert("🚨 ANTI-CHEAT ALARM 🚨\nEingriff in die Systemsteuerung blockiert.\nNotfallmodus: Windkanal-Überlastung!");
            }
        });
        acObserver.observe(uiBox, { childList: true, subtree: true, characterData: true });
    </script>
</body>
</html>
