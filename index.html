<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero Pro - Final Edition</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 10; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h3 { margin: 0 0 10px 0; color: #00ffcc; font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #111; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        .btn-group { display: flex; gap: 4px; margin-bottom: 8px; }
        button { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 7px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: 0.2s; }
        button.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        #resetBtn { background: #cc0000; color: white; border: none; width: 100%; font-weight: bold; margin-top: 5px; cursor: pointer; padding: 10px; border-radius: 4px; }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        
        /* Die magische Leiste, die verschwindet */
        #penControls { display: block; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; max-height: 200px; opacity: 1; }
        #penControls.hidden { max-height: 0; opacity: 0; margin: 0; padding: 0; pointer-events: none; }
        
        #shapeSubControls { display: flex; transition: 0.3s; }
        #shapeSubControls.hidden { display: none; }

        /* Anti-Cheat Look */
        .cheat-detected { background: #550000 !important; border-color: #ff0000 !important; }
        .cheat-detected h3 { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 id="appTitle">Aero-Turbulenz-Lab</h3>
        
        <div class="section">
            <label>Werkzeug</label>
            <select id="objectSelect" onchange="updateToolMode(this.value)">
                <option value="draw">✏️ Freihand Stift</option>
                <option value="rect_fixed">⬛ Festes Quadrat</option>
                <option value="circle_fixed">🌑 Fester Kreis</option>
                <option value="wing">✈️ NACA Flügel</option>
                <option value="supercar">🏎️ GT Auto</option>
            </select>
        </div>

        <div id="penControls" class="section">
            <label>Stift-Einstellungen</label>
            <input type="range" id="penSize" min="5" max="35" value="15">
            <div class="btn-group">
                <button id="solidBtn" class="active" onclick="setLineStyle('solid')">Voll</button>
                <button id="dashBtn" onclick="setLineStyle('dashed')">Gitter</button>
            </div>
            <div id="shapeSubControls" class="btn-group hidden">
                <button id="circleBtn" class="active" onclick="setPenShape('circle')">Kreis</button>
                <button id="rectBtn" onclick="setPenShape('rect')">Block</button>
            </div>
        </div>

        <div class="section">
            <label>Windstärke</label>
            <input type="range" id="speedRange" min="3" max="18" step="0.5" value="8">
        </div>
        
        <button id="resetBtn" onclick="resetSim()">🧹 Kanal leeren</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles = [], obstacles = [];
        let windSpeed = 8;
        let currentMode = 'draw';
        let lineStyle = 'solid';
        let penShape = 'circle';
        let isDrawing = false;
        let lastX = null, lastY = null;
        let isCheater = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let y = 0; y < height; y += 18) {
                for (let x = 0; x < width; x += 40) {
                    particles.push(new Particle(x, y));
                }
            }
        }

        // Steuert das Ein- und Ausblenden der Leiste
        function updateToolMode(mode) {
            currentMode = mode;
            const penControls = document.getElementById('penControls');
            if (mode === 'draw') {
                penControls.classList.remove('hidden');
            } else {
                penControls.classList.add('hidden');
            }
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('solidBtn').classList.toggle('active', style === 'solid');
            document.getElementById('dashBtn').classList.toggle('active', style === 'dashed');
            document.getElementById('shapeSubControls').classList.toggle('hidden', style !== 'dashed');
        }

        function setPenShape(shape) {
            penShape = shape;
            document.getElementById('circleBtn').classList.toggle('active', shape === 'circle');
            document.getElementById('rectBtn').classList.toggle('active', shape === 'rect');
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseY = y;
                this.vx = windSpeed; this.vy = 0;
                this.turb = 0;
            }
            update() {
                this.vx = windSpeed;
                this.vy += (this.baseY - this.y) * 0.04;
                this.vy *= 0.85;
                this.turb *= 0.92;

                obstacles.forEach(obs => {
                    let dx = this.x - obs.x;
                    let dy = this.y - obs.y;
                    let r = obs.r || 30;
                    let dist = Math.hypot(dx, dy);

                    if (dist < r + 45) {
                        let influence = (r + 45 - dist) / 45;
                        this.vx -= (dx / dist) * influence * windSpeed * 0.8;
                        this.vy += (dy / dist) * influence * windSpeed * 1.3;
                        if (dist < r) {
                            let angle = Math.atan2(dy, dx);
                            this.x = obs.x + Math.cos(angle) * r;
                            this.y = obs.y + Math.sin(angle) * r;
                            this.turb += 2.5;
                        }
                    }

                    if (this.x > obs.x && this.x < obs.x + 250) {
                        if (Math.abs(this.y - obs.y) < r * 1.4) {
                            this.turb += isCheater ? 10.0 : 0.2;
                            this.vy += Math.sin(this.x * 0.04 + Date.now() * 0.01) * this.turb;
                        }
                    }
                });

                this.x += this.vx;
                this.y += this.vy;
                if (this.x > width) { this.x = -10; this.y = this.baseY; this.turb = 0; }
            }
            draw() {
                let r = Math.min(255, this.turb * 75);
                let g = Math.max(0, 255 - (this.turb * 100));
                let b = Math.max(100, 255 - (this.turb * 200));
                ctx.fillStyle = isCheater ? `red` : `rgb(${r}, ${g}, ${b})`;
                ctx.fillRect(this.x, this.y, isCheater ? 12 : 3.5, 1.5);
            }
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = "#111";
                ctx.strokeStyle = isCheater ? "red" : "#00ffcc";
                ctx.lineWidth = 2;
                ctx.beginPath();
                if (obs.type.includes('circle') || (obs.type === 'draw' && obs.shape === 'circle')) {
                    ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI * 2);
                } else if (obs.type.includes('rect') || (obs.type === 'draw' && obs.shape === 'rect')) {
                    ctx.rect(obs.x - obs.r, obs.y - obs.r, obs.r * 2, obs.r * 2);
                } else if (obs.type === 'wing') {
                    ctx.ellipse(obs.x, obs.y, 60, 20, 0, 0, Math.PI * 2);
                } else if (obs.type === 'supercar') {
                    ctx.roundRect(obs.x - 65, obs.y - 15, 130, 30, 10);
                }
                ctx.fill(); ctx.stroke();
            });
        }

        function animate() {
            ctx.fillStyle = isCheater ? 'rgba(40, 0, 0, 0.3)' : 'rgba(5, 5, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);
            drawObstacles();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function handleInput(e, isStart) {
            if (isCheater) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const r = parseInt(document.getElementById('penSize').value);

            if (currentMode === 'draw') {
                if (isStart) {
                    lastX = x; lastY = y;
                    obstacles.push({ x, y, type: 'draw', r, shape: penShape, style: lineStyle });
                } else if (lastX !== null) {
                    if (Math.hypot(x-lastX, y-lastY) > 6) {
                        obstacles.push({ x, y, type: 'draw', r, shape: penShape, style: lineStyle });
                        lastX = x; lastY = y;
                    }
                }
            } else if (isStart) {
                obstacles.push({ x, y, type: currentMode, r: r * 1.5 });
            }
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => { if (isDrawing) handleInput(e, false); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleInput(e, true); }, {passive: false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) handleInput(e, false); }, {passive: false});
        
        document.getElementById('speedRange').oninput = e => { if(!isCheater) windSpeed = parseFloat(e.target.value); };
        function resetSim() { if(!isCheater) obstacles = []; }
        window.onresize = init;
        init(); animate();

        // --- ANTI-CHEAT ---
        const uiElement = document.getElementById('ui');
        const observer = new MutationObserver(() => { if (!isCheater) triggerCheatMode(); });
        observer.observe(uiElement, { childList: true, subtree: true, characterData: true });

        function triggerCheatMode() {
            isCheater = true;
            observer.disconnect();
            uiElement.classList.add('cheat-detected');
            document.getElementById('appTitle').innerText = "SYSTEM CRASH";
            windSpeed = 120;
            alert("🚨 ANTI-CHEAT ALARM 🚨\nManipulation gestoppt. Windkanal überlastet!");
        }
    </script>
</body>
</html>
