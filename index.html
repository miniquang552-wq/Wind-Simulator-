<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Sandbox Pro - Aero & Lines Update</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --water-accent: #00aaff; --chem-accent: #ff00cc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* --- MENÜS --- */
        #main-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #050505 100%);
            z-index: 100; transition: 0.5s;
        }
        .menu-title { font-size: 42px; color: var(--accent); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 600px; width: 90%; }
        
        .card { background: #1a1a1a; border: 2px solid #333; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 18px; font-weight: bold;}
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        
        /* --- UI --- */
        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.9); 
            padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 10; 
            width: 240px; backdrop-filter: blur(10px); 
        }
        .back-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 15px; font-size: 12px; }
        h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #111; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 12px; }
        #resetBtn { background: #cc0000; color: white; border: none; width: 100%; font-weight: bold; padding: 10px; border-radius: 4px; cursor: pointer; }

        /* --- PERIODENSYSTEM DRAWER --- */
        #chem-drawer {
            position: fixed; 
            bottom: -320px; left: 0; width: 100%; height: 380px;
            background: rgba(15, 5, 25, 0.98); border-top: 3px solid var(--chem-accent);
            z-index: 50; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            display: flex; flex-direction: column; align-items: center;
        }
        #chem-drawer.open { transform: translateY(-320px); }
        #drawer-handle {
            width: 100%; height: 60px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: linear-gradient(to bottom, #2a0a35, #150519);
            color: var(--chem-accent); font-weight: bold; font-size: 16px; text-transform: uppercase;
        }
        
        @keyframes bounceArrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .bounce { display: inline-block; animation: bounceArrow 1.5s infinite; margin: 0 10px; font-size: 20px; }

        #periodic-table {
            display: grid; grid-template-columns: repeat(18, 1fr); gap: 4px; padding: 15px;
            overflow: auto; width: 95%; max-width: 1100px;
        }
        .pt-element {
            width: 42px; height: 50px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; cursor: pointer; transition: 0.2s; border-radius: 3px; color: #000; font-weight: bold;
        }
        .pt-element:hover { transform: scale(1.2); z-index: 10; box-shadow: 0 0 15px white; }
        .pt-element span { font-size: 14px; }

        canvas { display: block; touch-action: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">Physics Lab Pro</h1>
        <div class="grid">
            <div class="card" onclick="startGame('wind')">🌬️ Windkanal</div>
            <div class="card" onclick="startGame('water')">🌊 Wasser</div>
            <div class="card" style="border-color: #ff00cc;" onclick="startGame('chem')">🧪 Chemie</div>
        </div>
    </div>

    <div id="game-container">
        <div id="ui">
            <button class="back-btn" onclick="backToMenu()">⬅ Menü</button>
            <h3 id="appTitle">Labor</h3>
            <div id="physics-controls">
                <div class="section">
                    <label>Werkzeug</label>
                    <select id="objectSelect">
                        <option value="draw">✏️ Stift (Voll-Linie)</option>
                        <option value="block">⬛ Block (Eckig)</option>
                        <option value="wing">✈️ Flügel (Aero)</option>
                        <option value="ball">⚽ Ball (schwimmt)</option>
                        <option value="stone">⚓ Stein (sinkt)</option>
                        <option value="smoke">💨 Rauch</option>
                    </select>
                </div>
                <div class="section">
                    <label>Größe</label>
                    <input type="range" id="penSize" min="10" max="80" value="25">
                    <label>Wind / Fluss-Speed</label>
                    <input type="range" id="speedRange" min="2" max="25" step="0.5" value="10">
                </div>
            </div>
            <button id="resetBtn" onclick="resetSim()">🧹 Alles Leeren</button>
        </div>

        <div id="chem-drawer" class="hidden">
            <div id="drawer-handle" onclick="toggleDrawer()"><span class="bounce">⬆️</span> PERIODENSYSTEM <span class="bounce">⬆️</span></div>
            <div id="periodic-table"></div>
        </div>

        <canvas id="simCanvas"></canvas>
    </div>

            {s:'Pb', n:'Blei', c:'#ccc', x:14, y:6}, {s:'Bi', n:'Wismut', c:'#ccc', x:15, y:6},
            {s:'Po', n:'Polonium', c:'#996', x:16, y:6}, {s:'At', n:'Astat', c:'#0f0', x:17, y:6},

            {s:'Eu', n:'Europium', c:'#fbf', x:10, y:8}, {s:'Gd', n:'Gadolinium', c:'#fbf', x:11, y:8},
            {s:'Tb', n:'Terbium', c:'#fbf', x:12, y:8}, {s:'Dy', n:'Dysprosium', c:'#fbf', x:13, y:8},
            {s:'Ho', n:'Holmium', c:'#fbf', x:14, y:8}, {s:'Er', n:'Erbium', c:'#fbf', x:15, y:8},
            {s:'Tm', n:'Thulium', c:'#fbf', x:16, y:8}, {s:'Yb', n:'Ytterbium', c:'#fbf', x:17, y:8},
            {s:'Lu', n:'Lutetium', c:'#fbf', x:18, y:8},
            {s:'Ac', n:'Actinium', c:'#f9f', x:4, y:9}, {s:'Th', n:'Thorium', c:'#f9f', x:5, y:9},
            {s:'Pa', n:'Protactinium', c:'#f9f', x:6, y:9}, {s:'U', n:'Uran', c:'#f9f', x:7, y:9},
            {s:'Np', n:'Neptunium', c:'#f9f', x:8, y:9}, {s:'Pu', n:'Plutonium', c:'#f9f', x:9, y:9},
            {s:'Am', n:'Americium', c:'#f9f', x:10, y:9}, {s:'Cm', n:'Curium', c:'#f9f', x:11, y:9},
            {s:'Bk', n:'Berkelium', c:'#f9f', x:12, y:9}, {s:'Cf', n:'Californium', c:'#f9f', x:13, y:9},
            {s:'Es', n:'Einsteinium', c:'#f9f', x:14, y:9}, {s:'Fm', n:'Fermium', c:'#f9f', x:15, y:9},
            {s:'Md', n:'Mendelevium', c:'#f9f', x:16, y:9}, {s:'No', n:'Nobelium', c:'#f9f', x:17, y:9},
            {s:'Lr', n:'Lawrencium', c:'#f9f', x:18, y:9}
        ];

        const recipes = [
            { req: ['H', 'O'], res: 'H2O', c:'#00aaff', n:'Wasser' },
            { req: ['Na', 'Cl'], res: 'NaCl', c:'#fff', n:'Salz' },
            { req: ['Na', 'H2O'], res: '💥', c:'#f50', n:'BUMM' }
        ];

        // --- PHYSIK ---
        class Particle {
            constructor(x, y, isSmoke = false) {
                this.x = x; this.y = y; this.baseY = y;
                this.vx = 0; this.vy = 0; this.turb = 0; this.active = true; this.isSmoke = isSmoke;
            }
            update() {
                let speed = parseFloat(document.getElementById('speedRange').value);
                let targetVx = (activeGame === 'wind') ? speed : (Math.sin(Date.now()*0.001 + this.y*0.015)*2.5);
                let targetVy = (activeGame === 'wind') ? (this.baseY - this.y) * 0.05 : -0.5;

                obstacles.forEach(obs => {
                    if(obs.type === 'smoke') return;
                    let dx = this.x - obs.x, dy = this.y - obs.y, dist = Math.hypot(dx, dy);
                    
                    if (obs.type === 'wing' && activeGame === 'wind') {
                        let relX = (this.x - obs.x) / (obs.r * 2) + 0.5;
                        if (relX >= 0 && relX <= 1) {
                            // Asymmetrisches Tragflächen-Profil für echte Aerodynamik
                            let profileTop = Math.sin(relX * Math.PI) * (obs.r * 0.4);
                            let profileBottom = Math.sin(relX * Math.PI) * (obs.r * 0.1);
                            
                            if (this.y > obs.y - profileTop - 6 && this.y < obs.y + profileBottom + 6) {
                                if (this.y < obs.y) {
                                    this.y = obs.y - profileTop - 6;
                                    targetVx *= 1.4; // Bernoulli-Effekt: Luft wird oben drüber beschleunigt
                                    this.turb += 0.05;
                                } else {
                                    this.y = obs.y + profileBottom + 6;
                                    targetVx *= 0.9; // Unten gebremst
                                    this.turb += 0.2;
                                }
                            }
                        }
                    } else if (dist < obs.r) {
                        let ang = Math.atan2(dy, dx);
                        this.x = obs.x + Math.cos(ang) * obs.r;
                        this.y = obs.y + Math.sin(ang) * obs.r;
                        this.turb += 0.8;
                    }
                });

                this.vx += (targetVx - this.vx) * 0.1; this.vy += (targetVy - this.vy) * 0.1;
                this.x += this.vx; this.y += this.vy; this.turb *= 0.9;
                if (this.x > width + 50 || this.x < -50) this.active = false;
            }
            draw() {
                ctx.fillStyle = this.isSmoke ? "#0fcc" : (activeGame === 'wind' ? `rgb(${this.turb*50},${200-this.turb*50},255)` : "#0af");
                ctx.fillRect(this.x, this.y, this.isSmoke?4:2, this.isSmoke?4:2);
            }
        }

        class FloatingObject {
            constructor(x, y, r, dens) {
                this.x = x; this.y = y; this.r = r; this.vx = 0; this.vy = 0; this.dens = dens;
            }
            update() {
                this.vy += 0.5 * this.dens; 
                this.vy -= 0.5; 
                this.vx *= 0.95; this.vy *= 0.95;
                this.x += this.vx; this.y += this.vy;
                if (this.y + this.r > height) { this.y = height - this.r; this.vy *= -0.5; }
            }
            draw() {
                ctx.fillStyle = this.dens > 1 ? "#777" : "#f90";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- CORE FUNKTIONEN ---
        window.onresize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
        
        function startGame(mode) {
            window.onresize();
            activeGame = mode;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('appTitle').innerText = mode;
            
            document.getElementById('chem-drawer').className = (mode === 'chem' ? "" : "hidden");
            document.getElementById('physics-controls').className = (mode === 'chem' ? "hidden" : "section");
            
            if (mode === 'chem') {
                const table = document.getElementById('periodic-table');
                table.innerHTML = '';
                elements.forEach(e => {
                    const div = document.createElement('div');
                    div.className = 'pt-element'; div.style.backgroundColor = e.c;
                    div.style.gridColumn = e.x; div.style.gridRow = e.y;
                    div.innerHTML = `<span>${e.s}</span>${e.n}`;
                    div.onclick = () => {
                        chemObjects.push({ id: e.s, x: width/2, y: height/2 - 100, r: 35, c: e.c, s: e.s, flashTicks: 0 });
                        toggleDrawer();
                    };
                    table.appendChild(div);
                });
            }
            resetSim();
        }

        function toggleDrawer() { 
            const drawer = document.getElementById('chem-drawer');
            drawer.classList.toggle('open'); 
            const handle = document.getElementById('drawer-handle');
            if(drawer.classList.contains('open')) {
                handle.innerHTML = '<span class="bounce">⬇️</span> SCHLIESSEN <span class="bounce">⬇️</span>';
            } else {
                handle.innerHTML = '<span class="bounce">⬆️</span> PERIODENSYSTEM <span class="bounce">⬆️</span>';
            }
        }

        function handleInput(e, isStart) {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
            const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
            
            if(clientX === undefined) return;
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            if (activeGame === 'chem') {
                if (isStart) draggedChem = chemObjects.slice().reverse().find(o => Math.hypot(x-o.x, y-o.y) < o.r);
                else if (draggedChem) { draggedChem.x = x; draggedChem.y = y; }
            } else if (isStart || isDrawing) {
                let tool = document.getElementById('objectSelect').value;
                let size = parseInt(document.getElementById('penSize').value);
                
                // Lückenloses Freihandzeichnen via Interpolation
                if (tool === 'draw') {
                    if (isStart) {
                        obstacles.push({x, y, r: size, type:'draw'});
                        window.lastDrawX = x; window.lastDrawY = y;
                    } else if (window.lastDrawX !== undefined) {
                        let dx = x - window.lastDrawX;
                        let dy = y - window.lastDrawY;
                        let dist = Math.hypot(dx, dy);
                        let steps = Math.max(1, Math.ceil(dist / (size / 4)));
                        
                        for (let i = 1; i <= steps; i++) {
                            obstacles.push({
                                x: window.lastDrawX + dx * (i / steps), 
                                y: window.lastDrawY + dy * (i / steps), 
                                r: size, type:'draw'
                            });
                        }
                        window.lastDrawX = x; window.lastDrawY = y;
                    }
                }
                else if (tool === 'block') obstacles.push({x, y, r: size, type:'block'});
                else if (isStart && tool === 'wing') obstacles.push({x, y, r: size * 2, type:'wing'});
                else if (isStart && tool === 'ball') floatingObjects.push(new FloatingObject(x, y, size, 0.6));
                else if (isStart && tool === 'stone') floatingObjects.push(new FloatingObject(x, y, size, 2.5));
                else if (isStart && tool === 'smoke') obstacles.push({x, y, type:'smoke'});
            }
        }

        function checkChem() {
            if (!draggedChem) return;
            if (draggedChem.y > height - 80) { chemObjects = chemObjects.filter(o => o !== draggedChem); }
            else {
                chemObjects.forEach(other => {
                    if (other === draggedChem) return;
                    if (Math.hypot(draggedChem.x - other.x, draggedChem.y - other.y) < 60) {
                        let r = recipes.find(rc => rc.req.includes(draggedChem.id) && rc.req.includes(other.id));
                        if (r) {
                            let nx = (draggedChem.x + other.x)/2, ny = (draggedChem.y + other.y)/2;
                            chemObjects = chemObjects.filter(o => o !== draggedChem && o !== other);
                            chemObjects.push({id: r.res, x: nx, y: ny, r: 40, c: r.c, s: r.res, flashTicks: 0});
                        } else {
                            draggedChem.flashTicks = 24; 
                            other.flashTicks = 24;
                        }
                    }
                });
            }
            draggedChem = null;
        }

        function animate() {
            ctx.fillStyle = activeGame === 'chem' ? "#100515" : "#050505";
            ctx.fillRect(0, 0, width, height);

            if (activeGame === 'wind' || activeGame === 'water') {
                if (activeGame === 'wind' && Math.random() < 0.6) {
                    for(let y=0; y<height; y+=25) particles.push(new Particle(-10, y + Math.random()*10));
                }
                obstacles.forEach(obs => {
                    if (obs.type === 'smoke' && Math.random() < 0.2) particles.push(new Particle(obs.x, obs.y, true));
                    
                    if (obs.type === 'block') {
                        ctx.fillStyle = "#444";
                        ctx.fillRect(obs.x - obs.r, obs.y - obs.r, obs.r*2, obs.r*2);
                    } else if (obs.type === 'wing') {
                        // Realistisches, asymmetrisches Tragflächenprofil zeichnen
                        ctx.fillStyle = "#555";
                        ctx.beginPath();
                        ctx.moveTo(obs.x - obs.r, obs.y);
                        ctx.bezierCurveTo(obs.x - obs.r/2, obs.y - obs.r*0.6, obs.x + obs.r/2, obs.y - obs.r*0.4, obs.x + obs.r, obs.y);
                        ctx.bezierCurveTo(obs.x + obs.r/2, obs.y + obs.r*0.1, obs.x - obs.r/2, obs.y + obs.r*0.1, obs.x - obs.r, obs.y);
                        ctx.fill();
                    } else if (obs.type !== 'smoke') {
                        ctx.fillStyle = "#333"; 
                        ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2); ctx.fill();
                    }
                });
                floatingObjects.forEach(o => { o.update(); o.draw(); });
                particles = particles.filter(p => { p.update(); p.draw(); return p.active; });
            }

            if (activeGame === 'chem') {
                chemObjects.forEach(o => {
                    let isRedFrame = o.flashTicks > 0 && Math.floor(o.flashTicks / 4) % 2 === 0;
                    ctx.fillStyle = isRedFrame ? "#ff0000" : o.c; 
                    ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
                    
                    if (o.flashTicks > 0) {
                        ctx.strokeStyle = "#ff0000";
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        o.flashTicks--;
                    }
                    ctx.fillStyle = isRedFrame ? "#fff" : "#000"; 
                    ctx.textAlign = "center"; ctx.font = "bold 20px Arial";
                    ctx.fillText(o.s, o.x, o.y + 7);
                });
            }
            requestAnimationFrame(animate);
        }

        function resetSim() { particles = []; obstacles = []; floatingObjects = []; chemObjects = []; }
        function backToMenu() { activeGame = null; document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('game-container').style.display='none'; }
        
        canvas.addEventListener('mousedown', e => { isDrawing=true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => handleInput(e, false));
        window.addEventListener('mouseup', () => { isDrawing=false; window.lastDrawX = undefined; checkChem(); });
        
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; handleInput(e, true); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e, false); }, {passive:false});
        canvas.addEventListener('touchend', () => { isDrawing=false; window.lastDrawX = undefined; checkChem(); });

        window.onresize(); animate();
    </script>
</body>
</html>
