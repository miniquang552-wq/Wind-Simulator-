<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Physics Sandbox - Neal.fun Style</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* HAUPTMENÜ STYLE */
        #main-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #050505 100%);
            z-index: 100; transition: 0.5s;
        }
        .menu-title { font-size: 48px; color: var(--accent); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(2, 200px); gap: 20px; }
        .card {
            background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .card i { font-size: 40px; display: block; margin-bottom: 10px; }

        /* SIMULATION UI */
        #game-container { display: none; width: 100%; height: 100%; }
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(10, 10, 15, 0.9); padding: 15px; 
            border-radius: 12px; border: 1px solid #444; z-index: 10;
        }
        .back-btn { 
            background: #333; color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; margin-bottom: 10px; width: 100%;
        }
        .back-btn:hover { background: #444; }
        
        canvas { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">Physics Lab</h1>
        <div class="grid">
            <div class="card" onclick="startGame('wind')">
                <i>🌬️</i>
                <span>Windkanal</span>
            </div>
            <div class="card" onclick="startGame('water')">
                <i>🌊</i>
                <span>Wasser-Becken</span>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <button class="back-btn" onclick="backToMenu()">⬅ Zurück zum Menü</button>
            <h3 id="current-mode-title">Modus</h3>
            <div id="controls">
                <input type="range" id="speedRange" min="1" max="20" value="8">
                <label style="font-size: 10px;">GESCHWINDIGKEIT</label>
            </div>
        </div>
        <canvas id="simCanvas"></canvas>
    </div>

    <script>
        const menu = document.getElementById('main-menu');
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const title = document.getElementById('current-mode-title');
        
        let activeGame = null;
        let particles = [];
        let width, height;
        let windSpeed = 8;

        // GAME LOGIC SELECTION
        function startGame(mode) {
            menu.classList.add('hidden');
            container.style.display = 'block';
            activeGame = mode;
            title.innerText = mode === 'wind' ? "🌬️ Windkanal" : "🌊 Wasser-Becken";
            initCanvas();
        }

        function backToMenu() {
            menu.classList.remove('hidden');
            container.style.display = 'none';
            activeGame = null;
            particles = [];
        }

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Start-Partikel erzeugen
            for(let i=0; i < (activeGame === 'wind' ? 100 : 300); i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = activeGame === 'wind' ? windSpeed : (Math.random() - 0.5) * 2;
                this.vy = activeGame === 'water' ? (Math.random() - 1) * 2 : 0; // Im Wasser leichtes Steigen
            }
            update() {
                if (activeGame === 'wind') {
                    this.x += windSpeed;
                    if (this.x > width) this.x = 0;
                } else if (activeGame === 'water') {
                    // Wasser-Physik: Wellenartige Bewegung
                    this.x += Math.sin(this.y * 0.01 + Date.now() * 0.002) * 2;
                    this.y += this.vy;
                    if (this.y < 0) this.y = height;
                }
            }
            draw() {
                ctx.fillStyle = activeGame === 'wind' ? '#00ffcc' : '#00aaff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, activeGame === 'wind' ? 1.5 : 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            if (activeGame) {
                ctx.fillStyle = activeGame === 'wind' ? 'rgba(5,5,5,0.2)' : 'rgba(0,20,40,0.3)';
                ctx.fillRect(0, 0, width, height);
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        document.getElementById('speedRange').oninput = (e) => windSpeed = parseInt(e.target.value);

        animate();
    </script>
</body>
</html>
