<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Sandbox Pro - 3 in 1</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --water-accent: #00aaff; --chem-accent: #ff00cc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- HAUPTMENÜ --- */
        #main-menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #050505 100%);
            z-index: 100; transition: 0.5s;
        }
        .menu-title { font-size: 42px; color: var(--accent); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; max-width: 700px; }
        .card {
            background: #1a1a1a; border: 2px solid #333; padding: 25px; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .card i { font-size: 40px; display: block; margin-bottom: 10px; font-style: normal; }

        /* --- SIMULATION UI --- */
        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        #ui { 
            position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.95); 
            padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 10; 
            width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); 
        }
        .back-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 15px; font-size: 12px; transition: 0.2s; }
        .back-btn:hover { background: #444; }
        
        h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        h3.water-title { color: var(--water-accent) !important; }
        h3.chem-title { color: var(--chem-accent) !important; }

        .section { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #111; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        .btn-group { display: flex; gap: 4px; margin-bottom: 8px; }
        button.tool-btn { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 7px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        button.water-active { background: var(--water-accent) !important; color: #000 !important; border-color: var(--water-accent) !important; font-weight: bold !important; }
        
        #resetBtn { background: #cc0000; color: white; border: none; width: 100%; font-weight: bold; padding: 10px; border-radius: 4px; cursor: pointer; }
        
        /* --- CHEMIE INVENTAR --- */
        #chem-inventory {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 10, 30, 0.9); padding: 10px; border-radius: 12px;
            border: 1px solid #80c; display: flex; gap: 10px; z-index: 10;
            max-width: 90%; overflow-x: auto;
        }
        .element-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid white;
            color: black; font-weight: bold; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 0 10px rgba(255,255,255,0.2); transition: 0.2s;
        }
        .element-btn:hover { transform: scale(1.1); }

        canvas { display: block; touch-action: none; cursor: crosshair; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="menu-title">Physics Lab Pro</h1>
        <div class="grid">
            <div class="card" onclick="startGame('wind')"><i>🌬️</i><span>Windkanal</span></div>
            <div class="card" onclick="startGame('water')"><i>🌊</i><span>Wasser-Becken</span></div>
            <div class="card" style="border-color: #ff00cc;" onclick="startGame('chem')"><i>🧪</i><span>Chemie-Labor</span></div>
        </div>
    </div>

    <div id="game-container">
        <div id="ui">
            <button class="back-btn" onclick="backToMenu()">⬅ Hauptmenü</button>
            <h3 id="appTitle">Aero-Secure-Lab</h3>
            
            <div id="physics-controls">
                <div id="wind-only-controls" class="section">
                    <label>Spaß-Szenarien</label>
                    <select id="presetSelect" onchange="loadPreset(this.value)">
                        <option value="">-- Szenario wählen --</option>
                        <option value="skyline">🏙️ Skyline</option>
                        <option value="cow">🐄 Kuh</option>
                    </select>
                </div>

                <div class="section">
                    <label id="toolLabel">Werkzeug</label>
                    <select id="objectSelect" onchange="updateToolMode(this.value)">
                        <option value="draw">✏️ Freihand Stift</option>
                        <option value="rect_fixed">⬛ Festes Quadrat</option>
                        <option value="circle_fixed">🌑 Fester Kreis</option>
                        <option id="wingOpt" value="wing">✈️ NACA Flügel</option>
                        <option id="smokeOpt" value="smoke">💨 Rauch-Düse</option>
                        <option id="ballOpt" value="ball" class="hidden">⚽ Ball (Schwimmt)</option>
                        <option id="sinkOpt" value="sinking_ball" class="hidden">⚓ Stein (Sinkt)</option>
                    </select>
                </div>

                <div id="penControls" class="section">
                    <label>Stift-Einstellungen</label>
                    <input type="range" id="penSize" min="5" max="35" value="15">
                    <div class="btn-group">
                        <button id="solidBtn" class="tool-btn active" onclick="setLineStyle('solid')">Voll</button>
                        <button id="dashBtn" class="tool-btn" onclick="setLineStyle('dashed')">Gitter</button>
                    </div>
                </div>

                <div class="section">
                    <label id="forceLabel">Kraft</label>
                    <input type="range" id="speedRange" min="2" max="20" step="0.5" value="8">
                </div>
            </div>

            <div id="chem-instructions" class="section hidden" style="font-size: 12px; color: #ccc;">
                Klicke unten auf Elemente, um sie zu spawnen. Ziehe sie mit der Maus übereinander, um neue Stoffe zu mixen!<br><br>
                <b>Tipp:</b> H + O = ?
            </div>

            <button id="resetBtn" onclick="resetSim()">🧹 Leeren</button>
        </div>

        <div id="chem-inventory" class="hidden">
            </div>

        <canvas id="simCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], obstacles = [], floatingObjects = [], chemObjects = [];
        let windSpeed = 8;
        let currentMode = 'draw', lineStyle = 'solid', spawnAcc = 0;
        let isDrawing = false, draggedChem = null, lastX = null, lastY = null;
        let activeGame = null;

        // --- CHEMIE DATENBANK ---
        const elementsData = {
            'H':  { name: 'Wasserstoff', color: '#ff9999', symbol: 'H' },
            'O':  { name: 'Sauerstoff', color: '#99ccff', symbol: 'O' },
            'Na': { name: 'Natrium', color: '#ffff99', symbol: 'Na' },
            'Cl': { name: 'Chlor', color: '#99ff99', symbol: 'Cl' },
            'C':  { name: 'Kohlenstoff', color: '#aaaaaa', symbol: 'C' },
            'H2O':{ name: 'Wasser', color: '#00aaff', symbol: 'H₂O' },
            'NaCl':{ name: 'Salz', color: '#ffffff', symbol: 'NaCl' },
            'CO2':{ name: 'Kohlendioxid', color: '#666666', symbol: 'CO₂' },
            'NaOH':{ name: 'Natronlauge', color: '#ffccff', symbol: 'NaOH' },
            'HCl':{ name: 'Salzsäure', color: '#ccffcc', symbol: 'HCl' },
            'Explosion': { name: 'BUMM!', color: '#ff5500', symbol: '💥' }
        };

        // Hier kannst du eigene Rezepte hinzufügen!
        const recipes = [
            { req: ['H', 'O'], result: 'H2O' },
            { req: ['Na', 'Cl'], result: 'NaCl' },
            { req: ['C', 'O'], result: 'CO2' },
            { req: ['H2O', 'Na'], result: 'NaOH' }, // Reagiert weiter!
            { req: ['H', 'Cl'], result: 'HCl' },
            { req: ['Na', 'H2O'], result: 'Explosion' } // Spaß-Rezept
        ];

        let unlockedElements = ['H', 'O', 'Na', 'Cl', 'C']; // Diese hast du am Anfang

        function renderChemInventory() {
            const inv = document.getElementById('chem-inventory');
            inv.innerHTML = '';
            unlockedElements.forEach(el => {
                const data = elementsData[el];
                const btn = document.createElement('div');
                btn.className = 'element-btn';
                btn.style.backgroundColor = data.color;
                btn.innerText = data.symbol;
                btn.title = data.name;
                btn.onclick = () => spawnChemElement(el);
                inv.appendChild(btn);
            });
        }

        function spawnChemElement(id) {
            chemObjects.push({
                id: id, x: width/2 + (Math.random()*40-20), y: height/2 + (Math.random()*40-20),
                r: 30, color: elementsData[id].color, symbol: elementsData[id].symbol
            });
        }

        // --- SPIELSTEUERUNG ---
        function startGame(mode) {
            activeGame = mode;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').style.display = 'block';
            resetSim();
            
            const appTitle = document.getElementById('appTitle');
            const toolSelect = document.getElementById('objectSelect');
            
            // UI für Wind/Wasser an oder ausschalten
            document.getElementById('physics-controls').style.display = (mode === 'chem') ? 'none' : 'block';
            document.getElementById('chem-inventory').className = (mode === 'chem') ? "" : "hidden";
            document.getElementById('chem-instructions').className = (mode === 'chem') ? "section" : "section hidden";
            
            if (mode === 'wind') {
                appTitle.innerText = "Windkanal"; appTitle.className = "";
                document.getElementById('wingOpt').className = ""; document.getElementById('smokeOpt').className = "";
                document.getElementById('ballOpt').className = "hidden"; document.getElementById('sinkOpt').className = "hidden";
                toolSelect.value = "draw"; updateToolMode("draw");
            } else if (mode === 'water') {
                appTitle.innerText = "Wasser-Becken"; appTitle.className = "water-title";
                document.getElementById('wingOpt').className = "hidden"; document.getElementById('smokeOpt').className = "hidden";
                document.getElementById('ballOpt').className = ""; document.getElementById('sinkOpt').className = "";
                toolSelect.value = "draw"; updateToolMode("draw");
            } else if (mode === 'chem') {
                appTitle.innerText = "Chemie-Labor"; appTitle.className = "chem-title";
                renderChemInventory();
            }
            init();
        }

        function backToMenu() {
            activeGame = null;
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-container').style.display = 'none';
        }

        function resetSim() { obstacles = []; particles = []; floatingObjects = []; chemObjects = []; init(); }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if(activeGame === 'wind') {
                for(let i=0; i<width; i+=25) spawnColumn(i);
            } else if (activeGame === 'water') {
                for(let i=0; i<400; i++) particles.push(new Particle(Math.random()*width, Math.random()*height, false));
            }
        }

        function spawnColumn(xPos) {
            for (let y = 10; y < height; y += 22) particles.push(new Particle(xPos, y + (Math.random()*10 - 5), false));
        }

        function updateToolMode(mode) {
            currentMode = mode;
            document.getElementById('penControls').className = (mode === 'draw') ? 'section' : 'section hidden';
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('solidBtn').classList.toggle('active', style === 'solid');
            document.getElementById('dashBtn').classList.toggle('active', style === 'dashed');
        }

        class Particle {
            constructor(x, y, isSmoke) {
                this.x = x; this.y = y; this.baseY = y;
                this.vx = windSpeed; this.vy = 0; this.turb = 0; this.active = true; this.isSmoke = isSmoke;
            }
            update() {
                let targetVx = (activeGame === 'wind') ? windSpeed : (Math.sin(Date.now()*0.001 + this.y*0.015)*2.5);
                let targetVy = (activeGame === 'wind') ? (this.baseY - this.y) * 0.05 : -0.7;

                obstacles.forEach(obs => {
                    if (obs.type === 'smoke') return;
                    let dx = this.x - obs.x, dy = this.y - obs.y, dist = Math.hypot(dx, dy), r = obs.r || 20;
                    if (dist < r) {
                        let ang = Math.atan2(dy, dx);
                        this.x = obs.x + Math.cos(ang) * r; this.y = obs.y + Math.sin(ang) * r;
                        this.turb += 1.2;
                    }
                });
                this.vx += (targetVx - this.vx) * 0.1; this.vy += (targetVy - this.vy) * 0.1;
                this.x += this.vx; this.y += this.vy; this.turb *= 0.93;
                if (activeGame === 'wind' && this.x > width + 20) this.active = false;
                if (activeGame === 'water' && this.y < -10) this.y = height + 10;
            }
            draw() {
                ctx.fillStyle = this.isSmoke ? "#00ffcc" : (activeGame === 'wind' ? `rgb(${this.turb*80},${255-this.turb*100},255)` : "rgba(0,170,255,0.8)");
                ctx.fillRect(this.x, this.y, this.isSmoke ? 4 : 2, this.isSmoke ? 4 : 2);
            }
        }

        function animate() {
            if (activeGame) {
                // Hintergrundfarbe je nach Modus
                if (activeGame === 'wind') ctx.fillStyle = "rgba(5,5,10,0.3)";
                else if (activeGame === 'water') ctx.fillStyle = "rgba(0,10,20,0.4)";
                else ctx.fillStyle = "rgba(20,10,30,1)"; // Chemie Hintergrund (starr)
                ctx.fillRect(0, 0, width, height);
                
                if(activeGame === 'wind' || activeGame === 'water') {
                    if(activeGame === 'wind') { spawnAcc += windSpeed; if(spawnAcc > 30) { spawnColumn(-20); spawnAcc = 0; } }
                    obstacles.forEach(obs => {
                        ctx.fillStyle = "#111"; ctx.strokeStyle = obs.type==='smoke'?"#00ffcc":"#888"; ctx.lineWidth = 2;
                        ctx.beginPath();
                        if(obs.type === 'rect_fixed') ctx.rect(obs.x-obs.r, obs.y-obs.r, obs.r*2, obs.r*2);
                        else ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
                        ctx.fill(); ctx.stroke();
                    });
                    particles = particles.filter(p => { p.update(); p.draw(); return p.active; });
                }

                if(activeGame === 'chem') {
                    // Zeichne Chemie-Elemente
                    chemObjects.forEach(obj => {
                        ctx.fillStyle = obj.color;
                        ctx.strokeStyle = "white"; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI*2);
                        ctx.fill(); ctx.stroke();
                        ctx.fillStyle = "black"; ctx.font = "bold 20px sans-serif";
                        ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.fillText(obj.symbol, obj.x, obj.y);
                    });
                }
            }
            requestAnimationFrame(animate);
        }

        // --- INTERAKTION ---
        function handleInput(e, isStart) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            if (activeGame === 'chem') {
                if (isStart) {
                    // Prüfen ob wir ein Element greifen (von hinten nach vorne wg. z-index)
                    for (let i = chemObjects.length - 1; i >= 0; i--) {
                        if (Math.hypot(x - chemObjects[i].x, y - chemObjects[i].y) < chemObjects[i].r) {
                            draggedChem = chemObjects[i];
                            break;
                        }
                    }
                } else if (draggedChem) {
                    draggedChem.x = x; draggedChem.y = y;
                }
            } else {
                // Wind & Wasser Interaktion
                const r = parseInt(document.getElementById('penSize').value);
                if (currentMode === 'draw' && isStart) {
                    obstacles.push({ x, y, r, isLine: false });
                } else if (!isStart && isDrawing && currentMode === 'draw') {
                    obstacles.push({ x, y, r, isLine: false });
                } else if (isStart) {
                    obstacles.push({ x, y, r: r*1.5, type: currentMode, isLine: false });
                }
            }
        }

        // Rezept-Prüfer
        function checkChemCombinations() {
            if (!draggedChem || activeGame !== 'chem') return;
            
            for (let i = 0; i < chemObjects.length; i++) {
                let other = chemObjects[i];
                if (other === draggedChem) continue;

                if (Math.hypot(draggedChem.x - other.x, draggedChem.y - other.y) < draggedChem.r + other.r) {
                    // Kollision! Rezept prüfen.
                    let pair = [draggedChem.id, other.id];
                    let match = recipes.find(r => 
                        (r.req[0] === pair[0] && r.req[1] === pair[1]) || 
                        (r.req[0] === pair[1] && r.req[1] === pair[0])
                    );

                    if (match) {
                        // Erfolgreich kombiniert!
                        let resultId = match.result;
                        let newX = (draggedChem.x + other.x) / 2;
                        let newY = (draggedChem.y + other.y) / 2;
                        
                        // Alte löschen
                        chemObjects = chemObjects.filter(c => c !== draggedChem && c !== other);
                        
                        // Neues spawnen
                        chemObjects.push({
                            id: resultId, x: newX, y: newY, r: 35,
                            color: elementsData[resultId].color, symbol: elementsData[resultId].symbol
                        });
                        
                        // Wenn noch nicht freigeschaltet, zum Inventar hinzufügen
                        if(!unlockedElements.includes(resultId)) {
                            unlockedElements.push(resultId);
                            renderChemInventory();
                        }
                        break; // Schleife abbrechen, da Objekte gelöscht wurden
                    }
                }
            }
            draggedChem = null;
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => { if (isDrawing || draggedChem) handleInput(e, false); });
        window.addEventListener('mouseup', () => { isDrawing = false; checkChemCombinations(); });
        
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleInput(e, true); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if(isDrawing || draggedChem) handleInput(e, false); }, {passive:false});
        canvas.addEventListener('touchend', () => { isDrawing = false; checkChemCombinations(); });

        document.getElementById('speedRange').oninput = e => windSpeed = parseFloat(e.target.value);
        window.onresize = init; animate();
    </script>
</body>
</html>
