<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero Pro - Stabil & Schnell</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #333; z-index: 10; width: 220px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        h3 { margin: 0 0 10px 0; color: #00d4ff; font-size: 15px; text-transform: uppercase; text-align: center; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; }
        select, input[type="range"] { width: 100%; margin-bottom: 12px; background: #1a1a1a; color: white; border: 1px solid #444; padding: 6px; border-radius: 6px; }
        button { width: 100%; background: #ff4444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Windtunnel (Stabil)</h3>
        <label>Windgeschwindigkeit</label>
        <input type="range" id="speedRange" min="2" max="15" step="0.5" value="6">
        
        <label>Modell auswählen</label>
        <select id="objectSelect" onchange="currentMode = this.value">
            <option value="wing">✈️ Flügel</option>
            <option value="supercar">🏎️ Sportwagen</option>
            <option value="rocket">🚀 Rakete</option>
            <option value="cat">🐈 Katze</option>
            <option value="drop">💧 Tropfen</option>
            <option value="draw">✏️ Freihand</option>
        </select>
        
        <button onclick="resetObstacles()">Alles löschen</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');

        let width, height, particles = [], obstacles = [];
        let windSpeed = 6;
        let currentMode = 'wing';
        let isDrawing = false;

        // Weniger Partikel = Keine Abstürze auf dem iPad!
        const MAX_PARTICLES = 400; 

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < MAX_PARTICLES; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() { this.reset(Math.random() * width); }
            reset(startX) {
                this.x = startX;
                this.y = Math.random() * height;
                this.vx = windSpeed;
                this.vy = 0;
            }
            update() {
                // Basis-Bewegung
                this.vx += (windSpeed - this.vx) * 0.1;
                this.vy *= 0.95; 

                obstacles.forEach(obs => {
                    let dx = this.x - obs.x;
                    let dy = this.y - obs.y;
                    let r = obs.r || 40;
                    
                    let distSq = dx*dx + dy*dy;
                    if (distSq < r*r) {
                        let dist = Math.sqrt(distSq);
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        // Sanftes Abprallen (iPad freundlich)
                        this.x += nx * (r - dist + 1);
                        this.vx += nx * 2;
                        this.vy += ny * 2;
                    }
                });

                this.x += this.vx;
                this.y += this.vy;

                // Zurücksetzen, wenn aus dem Bild geflogen
                if (this.x > width || this.y < 0 || this.y > height) this.reset(-10);
            }
            draw() {
                ctx.strokeStyle = "rgba(0, 212, 255, 0.6)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x - this.vx, this.y - this.vy);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        function drawShape(ctx, obs) {
            ctx.fillStyle = "#222";
            ctx.strokeStyle = "#00d4ff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            if (obs.type === 'wing') {
                ctx.ellipse(obs.x, obs.y, 60, 15, 0, 0, Math.PI * 2);
            } else if (obs.type === 'supercar') {
                ctx.rect(obs.x - 50, obs.y - 10, 100, 20);
                ctx.rect(obs.x - 20, obs.y - 25, 50, 15);
            } else if (obs.type === 'rocket') {
                ctx.moveTo(obs.x + 40, obs.y);
                ctx.lineTo(obs.x - 30, obs.y - 20);
                ctx.lineTo(obs.x - 30, obs.y + 20);
                ctx.closePath();
            } else if (obs.type === 'cat') {
                ctx.arc(obs.x, obs.y, 25, 0, Math.PI * 2); // Körper
                ctx.arc(obs.x + 25, obs.y - 15, 12, 0, Math.PI * 2); // Kopf
            } else if (obs.type === 'drop') {
                ctx.arc(obs.x - 15, obs.y, 20, Math.PI/2, -Math.PI/2); 
                ctx.lineTo(obs.x + 35, obs.y);
                ctx.closePath();
            } else if (obs.type === 'draw') {
                ctx.arc(obs.x, obs.y, 8, 0, Math.PI * 2);
            }
            
            ctx.fill();
            ctx.stroke();
        }

        function animate() {
            // Leicht flimmernder Schweif, der wenig Rechenleistung braucht
            ctx.fillStyle = 'rgba(5, 5, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            obstacles.forEach(obs => drawShape(ctx, obs));
            particles.forEach(p => { p.update(); p.draw(); });
            
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            if (currentMode === 'draw') {
                if (obstacles.length === 0 || Math.hypot(x-obstacles[obstacles.length-1].x, y-obstacles[obstacles.length-1].y) > 10) {
                    obstacles.push({ x, y, type: 'draw', r: 15 });
                }
            } else if (e.type === 'mousedown' || e.type === 'touchstart') {
                obstacles.push({ x, y, type: currentMode, r: (currentMode==='supercar'||currentMode==='wing'?50:35) });
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing=true; handleInput(e); });
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) handleInput(e); });
        window.addEventListener('mouseup', () => isDrawing=false);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing=true; handleInput(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(isDrawing) handleInput(e); }, {passive: false});
        canvas.addEventListener('touchend', () => isDrawing=false);
        
        speedRange.addEventListener('input', (e) => { windSpeed = parseFloat(e.target.value); });
        function resetObstacles() { obstacles = []; }
        
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
