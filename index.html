<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero Pro - Complete & Secure</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(10, 10, 15, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #444; z-index: 10; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h3 { margin: 0 0 10px 0; color: #00ffcc; font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #111; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 12px; outline: none; }
        .btn-group { display: flex; gap: 4px; margin-bottom: 8px; }
        button { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 7px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: 0.2s; }
        button.active { background: #00ffcc; color: #000; border-color: #00ffcc; font-weight: bold; }
        #resetBtn { background: #cc0000; color: white; border: none; width: 100%; font-weight: bold; margin-top: 5px; cursor: pointer; padding: 10px; border-radius: 4px; }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        #penControls.hidden { display: none; }
        .cheat-mode { background: #400 !important; border-color: #f00 !important; }
        .cheat-mode h3 { color: #f00 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 id="appTitle">Aero-Secure-Lab</h3>
        <div class="section">
            <label>Werkzeug</label>
            <select id="objectSelect" onchange="updateToolMode(this.value)">
                <option value="draw">✏️ Freihand Stift</option>
                <option value="rect_fixed">⬛ Festes Quadrat</option>
                <option value="circle_fixed">🌑 Fester Kreis</option>
                <option value="wing">✈️ NACA Flügel</option>
                <option value="supercar">🏎️ GT Auto</option>
            </select>
        </div>
        <div id="penControls" class="section">
            <label>Stift-Einstellungen</label>
            <input type="range" id="penSize" min="5" max="35" value="15">
            <div class="btn-group">
                <button id="solidBtn" class="active" onclick="setLineStyle('solid')">Voll</button>
                <button id="dashBtn" onclick="setLineStyle('dashed')">Gitter</button>
            </div>
            <div id="gridShapes" class="btn-group" style="display:none;">
                <button id="gridCircle" class="active" onclick="setGridShape('circle')">○</button>
                <button id="gridRect" onclick="setGridShape('rect')">□</button>
            </div>
        </div>
        <div class="section">
            <label>Windstärke</label>
            <input type="range" id="speedRange" min="3" max="18" step="0.5" value="8">
        </div>
        <button id="resetBtn" onclick="resetSim()">🧹 Kanal leeren</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], obstacles = [], windSpeed = 8, currentMode = 'draw', lineStyle = 'solid', gridShape = 'circle', isDrawing = false, lastX = null, lastY = null, isCheater = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<width; i+=25) spawnColumn(i);
        }

        function spawnColumn(xPos) {
            for (let y = 10; y < height; y += 22) {
                particles.push(new Particle(xPos, y + (Math.random()*10 - 5)));
            }
        }

        function updateToolMode(mode) {
            currentMode = mode;
            document.getElementById('penControls').className = (mode === 'draw') ? 'section' : 'section hidden';
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('solidBtn').className = (style === 'solid') ? 'active' : '';
            document.getElementById('dashBtn').className = (style === 'dashed') ? 'active' : '';
            document.getElementById('gridShapes').style.display = (style === 'dashed') ? 'flex' : 'none';
        }

        function setGridShape(shape) {
            gridShape = shape;
            document.getElementById('gridCircle').className = (shape === 'circle') ? 'active' : '';
            document.getElementById('gridRect').className = (shape === 'rect') ? 'active' : '';
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseY = y;
                this.vx = windSpeed; this.vy = 0;
                this.turb = 0; this.active = true;
            }
            update() {
                let targetVx = windSpeed;
                let targetVy = (this.baseY - this.y) * 0.05;

                obstacles.forEach(obs => {
                    let r = obs.r || 20;
                    if (obs.type === 'wing') {
                        let L = 140, relX = (this.x - obs.x) / L + 0.5;
                        if (relX >= 0 && relX <= 1) {
                            let yt = 12 * 0.12 * (0.2969 * Math.sqrt(relX) - 0.1260 * relX - 0.3516 * relX**2 + 0.2843 * relX**3 - 0.1015 * relX**4) * L;
                            let yc = (relX < 0.4) ? (0.02 / 0.16) * (0.8 * relX - relX**2) * L : (0.02 / 0.36) * (0.2 + 0.8 * relX - relX**2) * L;
                            let yTop = -yc - yt, yBot = -yc + yt, dy = this.y - obs.y;
                            if (Math.abs(dy - yTop) < 25 || Math.abs(dy - yBot) < 25) {
                                let slope = (relX < 0.95) ? (yt / (relX * L + 1)) * 0.4 : 0;
                                targetVy = (dy < 0) ? -slope * windSpeed : slope * windSpeed;
                                this.turb += 0.06;
                                if (dy > yTop && dy < yBot) this.y = obs.y + (dy < 0 ? yTop - 2 : yBot + 2);
                            }
                        }
                    } else if (obs.isLine) {
                        let l2 = (obs.x2-obs.x1)**2 + (obs.y2-obs.y1)**2;
                        let t = Math.max(0, Math.min(1, ((this.x-obs.x1)*(obs.x2-obs.x1) + (this.y-obs.y1)*(obs.y2-obs.y1))/l2));
                        let px = obs.x1 + t*(obs.x2-obs.x1), py = obs.y1 + t*(obs.y2-obs.y1);
                        let dist = Math.hypot(this.x - px, this.y - py);
                        if (dist < r) {
                            let ang = Math.atan2(this.y - py, this.x - px);
                            this.x = px + Math.cos(ang) * r; this.y = py + Math.sin(ang) * r;
                            this.vx *= 0.5; this.turb += 1.2;
                        }
                    } else {
                        let dx = this.x - obs.x, dy = this.y - obs.y, dist = Math.hypot(dx, dy);
                        if (dist < r + 30) {
                            let infl = (r + 30 - dist) / 30;
                            targetVx -= (dx / dist) * infl * windSpeed;
                            targetVy += (dy / dist) * infl * windSpeed * 0.5;
                            if (dist < r) {
                                let ang = Math.atan2(dy, dx);
                                this.x = obs.x + Math.cos(ang) * r; this.y = obs.y + Math.sin(ang) * r;
                                this.turb += 1.5;
                            }
                        }
                    }
                    if (this.x > obs.x + 10 && this.x < obs.x + 260 && Math.abs(this.y - obs.y) < r*1.6) {
                        this.turb += 0.12; this.vy += Math.sin(this.x * 0.05 + Date.now()*0.01) * this.turb;
                    }
                });

                this.vx += (targetVx - this.vx) * 0.1;
                this.vy += (targetVy - this.vy) * 0.1;
                this.x += this.vx; this.y += this.vy;
                this.turb *= 0.93;
                if (this.x > width + 20) this.active = false;
            }
            draw() {
                let r = Math.min(255, this.turb * 80), g = Math.max(0, 255 - this.turb * 100), b = Math.max(100, 255 - this.turb * 200);
                ctx.fillStyle = isCheater ? "red" : `rgb(${r},${g},${b})`;
                ctx.fillRect(this.x, this.y, isCheater ? 8 : 3.5, 1.5);
            }
        }

        function drawElements() {
            ctx.fillStyle = "#111"; ctx.strokeStyle = isCheater ? "red" : "#00ffcc"; ctx.lineWidth = 2;
            obstacles.forEach(obs => {
                ctx.beginPath();
                if (obs.type === 'wing') {
                    let L = 140;
                    for (let i = 0; i <= 40; i++) {
                        let rx = i / 40;
                        let yt = 12 * 0.12 * (0.2969 * Math.sqrt(rx) - 0.1260 * rx - 0.3516 * rx**2 + 0.2843 * rx**3 - 0.1015 * rx**4) * L;
                        let yc = (rx < 0.4) ? (0.02 / 0.16) * (0.8 * rx - rx**2) * L : (0.02 / 0.36) * (0.2 + 0.8 * rx - rx**2) * L;
                        i === 0 ? ctx.moveTo(obs.x + (rx-0.5)*L, obs.y-yc-yt) : ctx.lineTo(obs.x + (rx-0.5)*L, obs.y-yc-yt);
                    }
                    for (let i = 40; i >= 0; i--) {
                        let rx = i / 40;
                        let yt = 12 * 0.12 * (0.2969 * Math.sqrt(rx) - 0.1260 * rx - 0.3516 * rx**2 + 0.2843 * rx**3 - 0.1015 * rx**4) * L;
                        let yc = (rx < 0.4) ? (0.02 / 0.16) * (0.8 * rx - rx**2) * L : (0.02 / 0.36) * (0.2 + 0.8 * rx - rx**2) * L;
                        ctx.lineTo(obs.x + (rx-0.5)*L, obs.y-yc+yt);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                } else if (obs.isLine) {
                    ctx.lineWidth = obs.r*2; ctx.moveTo(obs.x1, obs.y1); ctx.lineTo(obs.x2, obs.y2); ctx.stroke(); ctx.lineWidth = 2;
                } else if (obs.type === 'circle_fixed' || obs.subType === 'circle') {
                    ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else if (obs.type === 'rect_fixed' || obs.subType === 'rect') {
                    ctx.rect(obs.x-obs.r, obs.y-obs.r, obs.r*2, obs.r*2); ctx.fill(); ctx.stroke();
                } else if (obs.type === 'supercar') {
                    ctx.roundRect(obs.x-60, obs.y-18, 120, 30, 10); ctx.fill(); ctx.stroke();
                }
            });
        }

        let spawnAcc = 0;
        function animate() {
            ctx.fillStyle = isCheater ? "rgba(60,0,0,0.3)" : "rgba(5,5,10,0.3)";
            ctx.fillRect(0, 0, width, height);
            spawnAcc += windSpeed; if(spawnAcc > 30) { spawnColumn(-20); spawnAcc = 0; }
            drawElements();
            particles = particles.filter(p => { p.update(); p.draw(); return p.active; });
            requestAnimationFrame(animate);
        }

        function handleInput(e, isStart) {
            if (isCheater) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const r = parseInt(document.getElementById('penSize').value);
            
            if (currentMode === 'draw') {
                if (isStart) {
                    lastX = x; lastY = y;
                    if (lineStyle === 'dashed') obstacles.push({ x, y, r, isLine: false, subType: gridShape });
                } else if (lastX !== null) {
                    if (lineStyle === 'solid') {
                        obstacles.push({ x1: lastX, y1: lastY, x2: x, y2: y, r: r, isLine: true });
                    } else if (Math.hypot(x-lastX, y-lastY) > r*2.5) {
                        obstacles.push({ x, y, r, isLine: false, subType: gridShape });
                    }
                    lastX = x; lastY = y;
                }
            } else if (isStart) {
                obstacles.push({ x, y, r: (currentMode==='wing'?35:r*1.5), type: currentMode, isLine: false });
            }
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => { if (isDrawing) handleInput(e, false); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleInput(e, true); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if(isDrawing) handleInput(e, false); }, {passive:false});
        document.getElementById('speedRange').oninput = e => { if(!isCheater) windSpeed = parseFloat(e.target.value); };
        function resetSim() { if(!isCheater) obstacles = []; }
        window.onresize = init; init(); animate();

        // 🚨 ANTI-CHEAT 🚨
        const uiBox = document.getElementById('ui');
        const acObserver = new MutationObserver(() => {
            if(!isCheater) { isCheater = true; uiBox.classList.add('cheat-mode'); document.getElementById('appTitle').innerText = "SYSTEM CRASH"; windSpeed = 140; alert("🚨 ANTI-CHEAT ALARM 🚨"); }
        });
        acObserver.observe(uiBox, { childList: true, subtree: true, characterData: true });
    </script>
</body>
</html>
