<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerodynamik Simulator</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #111;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            margin-top: 10px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Windtunnel Simulator</h3>
        <p>Klicke/Ziehe, um ein Objekt zu platzieren</p>
        <div class="controls">
            <label>Windgeschwindigkeit: <span id="speedVal">5</span></label>
            <input type="range" id="speedRange" min="0" max="15" step="0.1" value="5">
        </div>
        <div class="controls">
            <button onclick="resetObstacles()">Objekte löschen</button>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');
        const speedVal = document.getElementById('speedVal');

        let width, height;
        let particles = [];
        let obstacles = [];
        let windSpeed = 5;

        // Initialisierung
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Start-Partikel erzeugen
            for (let i = 0; i < 500; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.history = [];
            }

            update() {
                let nextX = this.x + windSpeed;
                let nextY = this.y;

                // Kollision mit Objekten (vereinfachte Aerodynamik)
                obstacles.forEach(obs => {
                    let dx = nextX - obs.x;
                    let dy = nextY - obs.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < obs.radius + 5) {
                        // Partikel wird um das Objekt herumgeleitet
                        let angle = Math.atan2(dy, dx);
                        nextX = obs.x + Math.cos(angle) * (obs.radius + 10);
                        nextY = obs.y + Math.sin(angle) * (obs.radius + 10);
                    }
                });

                this.x = nextX;
                this.y = nextY;

                // Wenn Partikel den Bildschirm verlässt, links neu starten
                if (this.x > width) {
                    this.x = 0;
                    this.y = Math.random() * height;
                }
            }

            draw() {
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x - windSpeed * 2, this.y);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(17, 17, 17, 0.2)'; // Schweif-Effekt
            ctx.fillRect(0, 0, width, height);

            obstacles.forEach(obs => {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // Interaktion
        canvas.addEventListener('mousedown', (e) => {
            obstacles.push({ x: e.clientX, y: e.clientY, radius: 30 });
        });

        speedRange.addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            speedVal.innerText = windSpeed;
        });

        function resetObstacles() {
            obstacles = [];
        }

        window.addEventListener('resize', init);

        init();
        animate();
    </script>
</body>
</html>
