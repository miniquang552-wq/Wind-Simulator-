<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktiver Aerodynamik-Zeichner</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #00d4ff; z-index: 10; width: 220px; }
        h3 { margin: 0 0 10px 0; color: #00d4ff; font-size: 16px; text-align: center; }
        .controls { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
        input[type="range"] { width: 100%; }
        button { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:active { background: #ff4444; }
        canvas { display: block; touch-action: none; }
        .info { font-size: 10px; color: #00d4ff; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Wind-Designer</h3>
        <div class="controls">
            <label>Wind-Speed: <span id="speedVal">5</span></label>
            <input type="range" id="speedRange" min="0" max="20" step="0.5" value="5">
        </div>
        <button onclick="resetObstacles()">Zeichnung löschen</button>
        <div class="info">Male mit dem Finger eine Form in den Wind!</div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');
        const speedVal = document.getElementById('speedVal');

        let width, height, particles = [], obstacles = [];
        let windSpeed = 5;
        let isDrawing = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 700; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() { this.reset(Math.random() * width); }
            reset(startX) {
                this.x = startX;
                this.y = Math.random() * height;
            }
            update() {
                let nextX = this.x + windSpeed;
                let nextY = this.y;

                // Kollision mit gezeichneten Punkten
                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    let dx = nextX - obs.x;
                    let dy = nextY - obs.y;
                    let distSq = dx*dx + dy*dy;

                    if (distSq < 400) { // 20 Pixel Radius
                        let dist = Math.sqrt(distSq);
                        let angle = Math.atan2(dy, dx);
                        nextX = obs.x + Math.cos(angle) * 22;
                        nextY = obs.y + Math.sin(angle) * 22;
                    }
                }

                this.x = nextX;
                this.y = nextY;
                if (this.x > width) this.reset(0);
            }
            draw() {
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x - 8, this.y);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.4)';
            ctx.fillRect(0, 0, width, height);
            
            // Gezeichnete Linien malen
            ctx.fillStyle = '#ff4444';
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // Zeichnen-Logik für iPad (Touch) und Maus
        function startDrawing(e) { isDrawing = true; addObstacle(e); }
        function stopDrawing() { isDrawing = false; }
        function handleMove(e) { if (isDrawing) addObstacle(e); }

        function addObstacle(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            // Nur hinzufügen, wenn der Punkt weit genug vom letzten entfernt ist
            if (obstacles.length === 0 || 
                Math.hypot(x - obstacles[obstacles.length-1].x, y - obstacles[obstacles.length-1].y) > 10) {
                obstacles.push({ x, y });
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        speedRange.addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            speedVal.innerText = windSpeed;
        });

        function resetObstacles() { obstacles = []; }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
