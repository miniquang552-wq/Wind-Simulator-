<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero Pro - Anti-Cheat Edition</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #020202; color: white; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(15, 15, 20, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #333; z-index: 10; width: 230px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        h3 { margin: 0 0 10px 0; color: #00d4ff; font-size: 14px; text-transform: uppercase; text-align: center; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { margin-bottom: 15px; padding: 5px 0; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        select, input[type="range"] { width: 100%; margin-bottom: 8px; background: #1a1a1a; color: white; border: 1px solid #444; padding: 6px; border-radius: 6px; font-size: 12px; outline: none; }
        .btn-group { display: flex; gap: 5px; margin-bottom: 8px; }
        button { flex: 1; background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        button.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: bold; }
        #resetBtn { background: #ff4444; color: white; border: none; margin-top: 5px; width: 100%; font-weight: bold; }
        canvas { display: block; touch-action: none; }
        
        #penControls { display: block; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 200px; opacity: 1; }
        #penControls.hidden { max-height: 0; opacity: 0; margin: 0; padding: 0; pointer-events: none; }
        
        #shapeControls { display: flex; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 50px; opacity: 1; }
        #shapeControls.hidden { max-height: 0; opacity: 0; margin: 0; pointer-events: none; }
        
        /* Alarm-Effekt für Cheater */
        .cheat-alarm { background: #4a0000 !important; }
        .cheat-alarm h3 { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 id="appTitle">Windkanal Pro</h3>
        
        <div class="section" id="menuText1">
            <label>Modell / Werkzeug</label>
            <select id="objectSelect" onchange="changeMode(this.value)">
                <option value="draw">✏️ Freihand Stift</option>
                <option value="wing">✈️ NACA Flügel</option>
                <option value="supercar">🏎️ GT Auto</option>
                <option value="rocket">🚀 Raketenspitze</option>
                <option value="drop">💧 Tropfen</option>
                <option value="cat">🐈 Katze</option>
            </select>
        </div>

        <div id="penControls" class="section">
            <label>Stift-Stärke</label>
            <input type="range" id="penSize" min="5" max="30" value="12">
            
            <label>Linien-Typ</label>
            <div class="btn-group">
                <button id="solidBtn" class="active" onclick="setLineStyle('solid')">Voll</button>
                <button id="dashBtn" onclick="setLineStyle('dashed')">Gitter</button>
            </div>
            
            <div id="shapeControls" class="btn-group hidden">
                <button id="circleBtn" class="active" onclick="setPenShape('circle')">⚫ Kreise</button>
                <button id="rectBtn" onclick="setPenShape('rect')">▮ Rechtecke</button>
            </div>
        </div>

        <div class="section">
            <label>Windgeschwindigkeit</label>
            <input type="range" id="speedRange" min="2" max="15" step="0.5" value="7">
        </div>
        
        <button id="resetBtn" onclick="resetObstacles()">🧹 Kanal leeren</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles = [], obstacles = [];
        let windSpeed = 7;
        let currentMode = 'draw';
        let lineStyle = 'solid';
        let penShape = 'circle';
        let isDrawing = false;
        let lastX = null, lastY = null;
        let drawDistance = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            let spacing = 20; 
            for (let y = 10; y < height; y += spacing) {
                for (let i = 0; i < width; i += 35) {
                    particles.push(new Particle(i, y));
                }
            }
        }

        function changeMode(mode) {
            currentMode = mode;
            const penControls = document.getElementById('penControls');
            if (mode === 'draw') penControls.classList.remove('hidden');
            else penControls.classList.add('hidden');
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('solidBtn').classList.toggle('active', style === 'solid');
            document.getElementById('dashBtn').classList.toggle('active', style === 'dashed');
            
            const shapeControls = document.getElementById('shapeControls');
            if (style === 'dashed') shapeControls.classList.remove('hidden');
            else shapeControls.classList.add('hidden');
        }

        function setPenShape(shape) {
            penShape = shape;
            document.getElementById('circleBtn').classList.toggle('active', shape === 'circle');
            document.getElementById('rectBtn').classList.toggle('active', shape === 'rect');
        }

        class Particle {
            constructor(startX, startY) {
                this.x = startX; this.y = startY; this.baseY = startY;
                this.vx = windSpeed; this.vy = 0;
            }
            update() {
                this.vx = windSpeed;
                this.vy += (this.baseY - this.y) * 0.05;
                this.vy *= 0.82;

                obstacles.forEach(obs => {
                    let dx = this.x - obs.x;
                    let dy = this.y - obs.y;
                    let r = obs.r;
                    
                    if (obs.type === 'supercar') dy = this.y - (obs.y + 10);
                    else if (obs.type === 'wing') if (dy < 0) dy *= 1.2;

                    let dist = Math.hypot(dx, dy);
                    if (dist < r + 30) {
                        let force = (r + 30 - dist) / (r + 30);
                        this.vx -= (dx / dist) * force * windSpeed * 0.9;
                        this.vy += (dy / dist) * force * windSpeed * 1.5;
                        if (dist < r) {
                            this.x += (dx / dist) * (r - dist);
                            this.y += (dy / dist) * (r - dist);
                        }
                    }
                });

                this.x += this.vx;
                this.y += this.vy;
                if (this.x > width) { this.x = -10; this.y = this.baseY; this.vx = windSpeed; this.vy = 0; }
            }
            draw() {
                ctx.fillStyle = "rgba(180, 230, 255, 0.8)";
                ctx.fillRect(this.x, this.y, 4, 1.5);
            }
        }

        function drawShapes() {
            obstacles.forEach(obs => {
                ctx.beginPath();
                if (obs.type === 'draw') {
                    ctx.fillStyle = "#00d4ff";
                    
                    if (obs.style === 'solid') {
                        ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obs.style === 'dashed') {
                        if (obs.shape === 'rect') {
                            // Rechtecke in die korrekte Richtung drehen
                            ctx.save();
                            ctx.translate(obs.x, obs.y);
                            ctx.rotate(obs.angle + Math.PI/2); // Senkrecht zum Strich ausrichten
                            // Zeichne ein Rechteck zentriert auf den Koordinaten
                            ctx.fillRect(-obs.r, -obs.r/3, obs.r * 2, obs.r / 1.5);
                            ctx.restore();
                        } else {
                            // Kreise als Gitter
                            ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } else {
                    ctx.fillStyle = "#111"; ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 2;
                    if (obs.type === 'wing') {
                        ctx.moveTo(obs.x - 45, obs.y + 5);
                        ctx.bezierCurveTo(obs.x - 45, obs.y - 25, obs.x + 10, obs.y - 20, obs.x + 55, obs.y + 5);
                        ctx.bezierCurveTo(obs.x + 10, obs.y + 10, obs.x - 40, obs.y + 15, obs.x - 45, obs.y + 5);
                    } else if (obs.type === 'supercar') {
                        ctx.moveTo(obs.x - 55, obs.y + 20); 
                        ctx.lineTo(obs.x - 55, obs.y + 10); 
                        ctx.quadraticCurveTo(obs.x - 30, obs.y - 5, obs.x - 10, obs.y - 10); 
                        ctx.quadraticCurveTo(obs.x + 5,  obs.y - 30, obs.x + 25, obs.y - 25); 
                        ctx.lineTo(obs.x + 55, obs.y - 5); 
                        ctx.lineTo(obs.x + 55, obs.y + 20); 
                        ctx.lineTo(obs.x - 55, obs.y + 20);
                    } else if (obs.type === 'drop') {
                        ctx.arc(obs.x - 25, obs.y, 25, Math.PI / 2, -Math.PI / 2); 
                        ctx.bezierCurveTo(obs.x, obs.y - 25, obs.x + 20, obs.y - 5, obs.x + 60, obs.y); 
                        ctx.bezierCurveTo(obs.x + 20, obs.y + 5, obs.x, obs.y + 25, obs.x - 25, obs.y + 25);
                    } else if (obs.type === 'rocket') {
                        ctx.moveTo(obs.x + 45, obs.y);
                        ctx.quadraticCurveTo(obs.x, obs.y - 22, obs.x - 35, obs.y - 22);
                        ctx.lineTo(obs.x - 35, obs.y + 22);
                        ctx.quadraticCurveTo(obs.x, obs.y + 22, obs.x + 45, obs.y);
                    } else if (obs.type === 'cat') {
                        ctx.ellipse(obs.x - 5, obs.y + 5, 30, 20, 0, 0, Math.PI * 2); 
                        ctx.arc(obs.x + 25, obs.y - 10, 14, 0, Math.PI * 2); 
                        ctx.moveTo(obs.x + 18, obs.y - 20); ctx.lineTo(obs.x + 22, obs.y - 35); ctx.lineTo(obs.x + 28, obs.y - 22); 
                        ctx.moveTo(obs.x + 28, obs.y - 22); ctx.lineTo(obs.x + 34, obs.y - 35); ctx.lineTo(obs.x + 36, obs.y - 18); 
                    }
                    ctx.fill(); ctx.stroke();
                }
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            obstacles.forEach(obs => {
                if (obs.type === 'supercar') {
                    ctx.strokeStyle = "rgba(255,255,255,0.1)";
                    ctx.beginPath(); ctx.moveTo(0, obs.y + 25); ctx.lineTo(width, obs.y + 25); ctx.stroke();
                }
            });
            
            drawShapes();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function handleInput(e, isStart) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const r = parseInt(document.getElementById('penSize').value);

            if (currentMode === 'draw') {
                if (isStart) {
                    lastX = x; lastY = y;
                    drawDistance = 0;
                    obstacles.push({ x, y, type: 'draw', r: r, style: lineStyle, shape: penShape, angle: 0 });
                } else if (lastX !== null) {
                    let dx = x - lastX;
                    let dy = y - lastY;
                    let dist = Math.hypot(dx, dy);
                    if (dist < 2) return; 

                    let steps = Math.ceil(dist / 2); 
                    let drawAngle = Math.atan2(dy, dx); // Berechnet die Zugrichtung des Stifts
                    
                    for (let i = 1; i <= steps; i++) {
                        drawDistance += 2; 
                        let ix = lastX + dx * (i / steps);
                        let iy = lastY + dy * (i / steps);
                        
                        if (lineStyle === 'dashed') {
                            let gapSize = r * 3.5; // Abstand zwischen den Gitter-Elementen
                            if (drawDistance % gapSize < 2) { 
                                obstacles.push({ x: ix, y: iy, type: 'draw', r: r, style: 'dashed', shape: penShape, angle: drawAngle });
                            }
                        } else {
                            obstacles.push({ x: ix, y: iy, type: 'draw', r: r, style: 'solid', shape: 'circle', angle: drawAngle });
                        }
                    }
                    lastX = x; lastY = y;
                }
            } else if (isStart) {
                obstacles.push({ x, y, type: currentMode, r: (currentMode==='supercar'||currentMode==='wing'?55:40) });
            }
        }

        canvas.addEventListener('mousedown', e => { isDrawing = true; handleInput(e, true); });
        canvas.addEventListener('mousemove', e => { if (isDrawing) handleInput(e, false); });
        window.addEventListener('mouseup', () => { isDrawing = false; lastX = null; });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; handleInput(e, true); }, {passive: false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing) handleInput(e, false); }, {passive: false});
        canvas.addEventListener('touchend', () => { isDrawing = false; lastX = null; });
        document.getElementById('speedRange').oninput = e => windSpeed = parseFloat(e.target.value);
        function resetObstacles() { obstacles = []; }
        window.onresize = init;
        init(); animate();

        // --------------------------------------------------------
        // 🚨 ANTI-CHEAT SYSTEM 🚨
        // --------------------------------------------------------
        const targetNode = document.getElementById('ui');
        const observerConfig = { characterData: true, subtree: true, childList: true };
        
        // Verhindert, dass der Kumpel im DOM rumbastelt
        const antiCheatObserver = new MutationObserver(function(mutationsList) {
            for(let mutation of mutationsList) {
                // Wenn ein Text geändert wurde, der nicht unsere Slider-Inputs sind...
                if (mutation.type === 'characterData' || (mutation.type === 'childList' && mutation.addedNodes.length > 0 && mutation.addedNodes[0].nodeType === 3)) {
                    triggerAntiCheat();
                }
            }
        });

        // Scharfschalten, sobald die App geladen ist (verzögert um 2 Sekunden, um Initialisierung nicht zu blockieren)
        setTimeout(() => { antiCheatObserver.observe(targetNode, observerConfig); }, 2000);

        function triggerAntiCheat() {
            antiCheatObserver.disconnect(); // Verhindert Endlos-Schleife
            
            alert("🚨 ANTI-CHEAT ALARM 🚨\n\nNetter Versuch, Kumpel! Manipulation des System entdeckt.\nWindkanal wird auf Notfall-Protokoll umgestellt!");
            
            // Bildschirm rot färben
            document.body.classList.add("cheat-alarm");
            document.getElementById('ui').classList.add("cheat-alarm");
            
            // Windgeschwindigkeit auf Mach 10 setzen (eskalation)
            windSpeed = 80; 
            document.getElementById('speedRange').value = 15;
            
            // Alle Hindernisse wegpusten
            obstacles = [];
            
            // Text auf Trolleinstellung setzen
            document.getElementById('appTitle').innerText = "CHEATER DETECTED";
        }
    </script>
</body>
</html>
