<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Lab Pro - Relaxed Edition</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --chem-accent: #ff00cc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        #main-menu {
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #050505 100%); z-index: 100;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; }
        .card:hover { border-color: var(--accent); }

        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; z-index: 10; width: 220px; border: 1px solid #444; }
        
        /* Periodensystem Drawer */
        #chem-drawer {
            position: fixed; bottom: -330px; left: 0; width: 100%; height: 400px;
            background: #100515; border-top: 3px solid var(--chem-accent); z-index: 50; transition: 0.4s;
        }
        #chem-drawer.open { transform: translateY(-330px); }
        #drawer-handle { height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--chem-accent); font-weight: bold; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .arrow { font-size: 30px; animation: bounce 1s infinite; margin: 0 15px; }

        #periodic-table { display: grid; grid-template-columns: repeat(18, 1fr); gap: 4px; padding: 10px; overflow: auto; }
        .pt-el { width: 40px; height: 50px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; color: black; font-weight: bold; }

        canvas { display: block; }
        .hidden { display: none; }
        select, input { width: 100%; margin-top: 5px; margin-bottom: 10px; }
    </style>
</head>
<body id="mainBody">

    <div id="main-menu">
        <h1 style="color: var(--accent)">PHYSICS LAB PRO</h1>
        <div class="grid">
            <div class="card" onclick="startGame('wind')">🌬️ Wind</div>
            <div class="card" onclick="startGame('water')">🌊 Wasser</div>
            <div class="card" onclick="startGame('chem')">🧪 Chemie</div>
        </div>
    </div>

    <div id="game-container">
        <div id="ui">
            <button onclick="location.reload()">⬅ Zurück</button>
            <h3 id="mode-title">Labor</h3>
            <label>Werkzeug:</label>
            <select id="toolSelect">
                <option value="block">⬛ Fester Block</option>
                <option value="wing">✈️ Realistischer Flügel</option>
                <option value="ball">⚽ Ball (leicht)</option>
                <option value="stone">⚓ Stein (schwer)</option>
            </select>
            <label>Größe:</label>
            <input type="range" id="sizeRange" min="10" max="100" value="40">
            <label>Wind/Fluss-Speed:</label>
            <input type="range" id="speedRange" min="0" max="25" value="10">
            <button onclick="resetSim()" style="background: #444; color: white; border: none; padding: 10px; width: 100%; cursor: pointer;">🧹 Leeren</button>
        </div>

        <div id="chem-drawer" class="hidden">
            <div id="drawer-handle" onclick="toggleDrawer()">
                <span class="arrow">⬆️</span> PERIODENSYSTEM HIER ZIEHEN <span class="arrow">⬆️</span>
            </div>
            <div id="periodic-table"></div>
        </div>

        <canvas id="simCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('mainBody');
        let width, height, activeGame = null;
        let particles = [], obstacles = [], items = [];
        let isDrawing = false;

        // --- ELEMENTS DATA (Shortened for space, but functional) ---
        const elements = [
            {s:'H', c:'#fff', x:1, y:1}, {s:'He', c:'#f9c', x:18, y:1},
            {s:'Li', c:'#f66', x:1, y:2}, {s:'Be', c:'#f96', x:2, y:2},
            {s:'C', c:'#888', x:14, y:2}, {s:'O', c:'#0cf', x:16, y:2},
            {s:'Na', c:'#f33', x:1, y:3}, {s:'Cl', c:'#0f0', x:17, y:3}
        ];

        function startGame(mode) {
            activeGame = mode;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('mode-title').innerText = mode.toUpperCase();
            if(mode === 'chem') {
                document.getElementById('chem-drawer').classList.remove('hidden');
                setupTable();
            }
            window.onresize();
        }

        function setupTable() {
            const table = document.getElementById('periodic-table');
            table.innerHTML = '';
            elements.forEach(e => {
                const div = document.createElement('div');
                div.className = 'pt-el'; div.style.backgroundColor = e.c;
                div.style.gridColumn = e.x; div.style.gridRow = e.y;
                div.innerHTML = e.s;
                div.onclick = () => { items.push({s: e.s, x: width/2, y: height/2, c: e.c, r: 30}); toggleDrawer(); };
                table.appendChild(div);
            });
        }

        function toggleDrawer() { document.getElementById('chem-drawer').classList.toggle('open'); }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.oy = y;
                this.vx = 0; this.vy = 0;
            }
            update(speed) {
                let tx = speed;
                let ty = (this.oy - this.y) * 0.1;

                obstacles.forEach(o => {
                    let dx = this.x - o.x;
                    let dy = this.y - o.y;
                    let dist = Math.hypot(dx, dy);

                    if (o.type === 'block' && dist < o.r) {
                        let ang = Math.atan2(dy, dx);
                        this.x = o.x + Math.cos(ang) * o.r;
                        this.y = o.y + Math.sin(ang) * o.r;
                    } 
                    if (o.type === 'wing') {
                        // Realistischere Flügel-Umströmung
                        let relX = (this.x - o.x) / (o.r * 2) + 0.5;
                        if (relX > 0 && relX < 1) {
                            let profile = Math.sin(relX * Math.PI) * (o.r * 0.5);
                            if (Math.abs(this.y - o.y) < profile + 10) {
                                this.y = o.y + (this.y < o.y ? -profile - 5 : profile + 5);
                                tx *= 1.2; // Beschleunigung über dem Flügel
                            }
                        }
                    }
                });

                this.vx += (tx - this.vx) * 0.1;
                this.vy += (ty - this.vy) * 0.1;
                this.x += this.vx; this.y += this.vy;
                if(this.x > width) this.x = 0;
            }
            draw() {
                ctx.fillStyle = activeGame === 'wind' ? '#0af' : '#04f';
                ctx.fillRect(this.x, this.y, 2, 2);
            }
        }

        function handleInput(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            const tool = document.getElementById('toolSelect').value;
            const size = parseInt(document.getElementById('sizeRange').value);

            if (tool === 'block') obstacles.push({x, y, r: size, type: 'block'});
            if (tool === 'wing') obstacles.push({x, y, r: size, type: 'wing'});
        }

        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
            const speed = parseFloat(document.getElementById('speedRange').value);

            if (activeGame === 'wind' || activeGame === 'water') {
                if (particles.length < 300) {
                    for(let i=0; i<5; i++) particles.push(new Particle(Math.random()*width, Math.random()*height));
                }
                particles.forEach(p => { p.update(speed); p.draw(); });
                
                obstacles.forEach(o => {
                    ctx.strokeStyle = varColor(o.type);
                    ctx.lineWidth = 2;
                    if(o.type === 'block') {
                        ctx.strokeRect(o.x - o.r/2, o.y - o.r/2, o.r, o.r);
                    } else {
                        // Flügel Zeichnen
                        ctx.beginPath();
                        ctx.ellipse(o.x, o.y, o.r, o.r/3, 0, 0, Math.PI*2);
                        ctx.stroke();
                    }
                });
            }

            if (activeGame === 'chem') {
                items.forEach(it => {
                    ctx.fillStyle = it.c; ctx.beginPath(); ctx.arc(it.x, it.y, it.r, 0, 7); ctx.fill();
                    ctx.fillStyle = "black"; ctx.fillText(it.s, it.x-5, it.y+5);
                });
            }
            requestAnimationFrame(animate);
        }

        function varColor(type) { return type === 'block' ? '#555' : '#0f0'; }
        function resetSim() { obstacles = []; particles = []; items = []; }

        window.onresize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', handleInput);
        canvas.addEventListener('touchstart', () => isDrawing = true);
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', handleInput);

        animate();
    </script>
</body>
</html>
