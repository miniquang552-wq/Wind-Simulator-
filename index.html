<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimativer Windtunnel</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: white; overflow: hidden; display: flex; flex-direction: column; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #00d4ff; z-index: 10; width: 220px; }
        h3 { margin: 0 0 10px 0; color: #00d4ff; font-size: 16px; text-align: center; }
        .controls { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        button.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: bold; }
        #clearBtn { grid-column: span 2; background: #ff4444; border: none; margin-top: 5px; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Wind-Labor</h3>
        <div class="controls">
            <label>Wind-Speed: <span id="speedVal">5</span></label>
            <input type="range" id="speedRange" min="0" max="20" step="0.5" value="5">
        </div>
        
        <label>Modus:</label>
        <div class="grid">
            <button id="drawMode" class="active" onclick="setMode('draw')">✏️ Zeichnen</button>
            <button id="circleMode" onclick="setMode('circle')">⭕ Kreis</button>
            <button id="rectMode" onclick="setMode('rect')">🟦 Block</button>
            <button id="clearBtn" onclick="resetObstacles()">🗑️ Löschen</button>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');
        const speedVal = document.getElementById('speedVal');

        let width, height, particles = [], obstacles = [];
        let windSpeed = 5;
        let isDrawing = false;
        let currentMode = 'draw';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(mode + 'Mode').classList.add('active');
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 650; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() { this.reset(Math.random() * width); }
            reset(startX) {
                this.x = startX;
                this.y = Math.random() * height;
            }
            update() {
                let nextX = this.x + windSpeed;
                let nextY = this.y;

                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    let dx = nextX - obs.x;
                    let dy = nextY - obs.y;

                    if (obs.type === 'draw' || obs.type === 'circle') {
                        let r = obs.type === 'draw' ? 15 : 40;
                        let distSq = dx*dx + dy*dy;
                        if (distSq < r*r) {
                            let dist = Math.sqrt(distSq);
                            let angle = Math.atan2(dy, dx);
                            nextX = obs.x + Math.cos(angle) * (r + 2);
                            nextY = obs.y + Math.sin(angle) * (r + 2);
                        }
                    } else if (obs.type === 'rect') {
                        if (Math.abs(dx) < 40 && Math.abs(dy) < 40) {
                            nextX = obs.x - 42; 
                        }
                    }
                }

                this.x = nextX;
                this.y = nextY;
                if (this.x > width) this.reset(0);
            }
            draw() {
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x - 10, this.y);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.type === 'rect' ? '#ffaa00' : (obs.type === 'circle' ? '#00d4ff' : '#ff4444');
                ctx.beginPath();
                if (obs.type === 'rect') ctx.fillRect(obs.x - 35, obs.y - 35, 70, 70);
                else ctx.arc(obs.x, obs.y, obs.type === 'draw' ? 5 : 38, 0, Math.PI * 2);
                ctx.fill();
            });

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            if (currentMode === 'draw') {
                if (obstacles.length === 0 || Math.hypot(x - obstacles[obstacles.length-1].x, y - obstacles[obstacles.length-1].y) > 12) {
                    obstacles.push({ x, y, type: 'draw' });
                }
            } else if (e.type === 'mousedown' || e.type === 'touchstart') {
                obstacles.push({ x, y, type: currentMode });
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleInput(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handleInput(e); });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; handleInput(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) handleInput(e); }, {passive: false});
        canvas.addEventListener('touchend', () => isDrawing = false);

        speedRange.addEventListener('input', (e) => { windSpeed = parseFloat(e.target.value); speedVal.innerText = windSpeed; });
        function resetObstacles() { obstacles = []; }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
